groups:
- name: kubernetes-system-kubelet
  rules:
  - alert: KubeNodeNotReady
    annotations:
      description: '{{ $labels.node }} has been unready for more than 15 minutes on
        cluster {{ $labels.cluster }}.'
      runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubenodenotready
      summary: Node is not ready.
    expr: 'kube_node_status_condition{job="kube-state-metrics",condition="Ready",status="true"}
      == 0

      and on (cluster, node)

      kube_node_spec_unschedulable{job="kube-state-metrics"} == 0'
    for: 15m
    labels:
      rackspace_com_coreAccountID: '5002029'
      rackspace_com_overseerID: '935811'
      severity: warning
