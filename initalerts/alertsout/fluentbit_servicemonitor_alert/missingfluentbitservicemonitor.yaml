groups:
- name: fluentbit_servicemonitor_alert
  rules:
  - alert: MissingFluentbitServiceMonitor
    annotations:
      description: 'Check if the Fluentbit ServiceMonitor is properly configured and
        deployed.

        '
      summary: ServiceMonitor 'fluentbit-fluent-bit' is either down or missing.
    expr: count(up{job="fluentbit-fluent-bit"}) == 0
    for: 1m
    labels:
      severity: critical
