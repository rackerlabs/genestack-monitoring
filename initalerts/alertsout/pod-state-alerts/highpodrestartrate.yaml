groups:
- name: pod-state-alerts
  rules:
  - alert: HighPodRestartRate
    annotations:
      description: Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting
        frequently, which may indicate network instability.
      summary: High pod restart count detected
    expr: rate(kube_pod_container_status_restarts_total[5m]) > 2
    for: 5m
    labels:
      severity: warning
