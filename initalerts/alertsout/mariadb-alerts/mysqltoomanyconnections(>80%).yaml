groups:
- name: mariadb-alerts
  rules:
  - alert: MysqlTooManyConnections(>80%)
    annotations:
      description: "More than 80% of MySQL connections are in use on {{ $labels.instance\
        \ }}\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
      summary: MySQL too many connections (> 80%) (instance {{ $labels.instance }})
    expr: max_over_time(mysql_global_status_threads_connected[1m]) / mysql_global_variables_max_connections
      * 100 > 80
    for: 2m
    labels:
      severity: warning
