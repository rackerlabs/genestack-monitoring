groups:
- name: mariadb-alerts
  rules:
  - alert: MariaDBReplicationErrors
    annotations:
      description: MariaDB {{$labels.job}} on {{$labels.instance}} is reporting replication
        errors.
      summary: MariaDB is reporting replication errors from {{$labels.instance}},
        immediate attention is required.
    expr: mysql_slave_status_last_sql_errno != 0 or mysql_slave_status_last_io_errno
      != 0 or mysql_slave_status_last_errno != 0
    for: 5m
    labels:
      severity: critical
