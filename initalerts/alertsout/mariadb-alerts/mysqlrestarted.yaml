groups:
- name: mariadb-alerts
  rules:
  - alert: MysqlRestarted
    annotations:
      description: 'MySQL has just been restarted, less than one minute ago on {{
        $labels.instance }}.

        VALUE = {{ $value }}

        LABELS = {{ $labels }}

        '
      summary: MySQL restarted (instance {{ $labels.instance }})
    expr: mysql_global_status_uptime < 60
    for: 0m
    labels:
      severity: info
