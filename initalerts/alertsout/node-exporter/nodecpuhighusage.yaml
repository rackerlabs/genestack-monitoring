groups:
- name: node-exporter
  rules:
  - alert: NodeCPUHighUsage
    annotations:
      description: 'CPU usage at {{ $labels.instance }} has been above 90% for the
        last 15 minutes, is currently at {{ printf "%.2f" $value }}%.

        '
      runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodecpuhighusage
      summary: High CPU usage.
    expr: sum without(mode) (avg without (cpu) (rate(node_cpu_seconds_total{job="node-exporter",
      mode!~"idle|iowait"}[2m]))) * 100 > 90
    for: 15m
    labels:
      rackspace_com_coreAccountID: '5002029'
      rackspace_com_overseerID: '935811'
      severity: info
