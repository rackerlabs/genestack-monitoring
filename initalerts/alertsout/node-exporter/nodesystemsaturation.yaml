groups:
- name: node-exporter
  rules:
  - alert: NodeSystemSaturation
    annotations:
      description: 'System load per core at {{ $labels.instance }} has been above
        2 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.

        This might indicate this instance resources saturation and can cause it becoming
        unresponsive.

        '
      runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemsaturation
      summary: System saturated, load per core is very high.
    expr: 'node_load1{job="node-exporter"}

      / count without (cpu, mode) (node_cpu_seconds_total{job="node-exporter", mode="idle"})
      > 2'
    for: 15m
    labels:
      rackspace_com_coreAccountID: '5002029'
      rackspace_com_overseerID: '935811'
      severity: warning
