groups:
- name: linux_mdm_device_and_raid_alerts
  rules:
  - alert: NodeMdStateCritical
    annotations:
      description: '{{ $labels.name }}

        MD RAID status:{{ $value }}

        MD RAID device:{{ $labels.device }}

        LABELS: {{ $labels }}'
      summary: Linux MDM RAID State is {{ $labels.state }}
    expr: node_md_state{job="node-exporter", state!~"active.*|check.*"} > 0
    for: 3m
    labels:
      coreAccountID: '{{ $labels.rackspace_com_coreAccountID }}'
      coreDeviceID: '{{ $labels.rackspace_com_coreDeviceID }}'
      node: '{{ $labels.instance }}'
      severity: critical
