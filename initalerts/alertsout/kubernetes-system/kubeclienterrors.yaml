groups:
- name: kubernetes-system
  rules:
  - alert: KubeClientErrors
    annotations:
      description: Kubernetes API server client '{{ $labels.job }}/{{ $labels.instance
        }}' is experiencing {{ $value | humanizePercentage }} errors on cluster {{
        $labels.cluster }}.
      runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclienterrors
      summary: Kubernetes API server client is experiencing errors.
    expr: "(sum(rate(rest_client_requests_total{job=\"apiserver\",code=~\"5..\"}[5m]))\
      \ by (cluster, instance, job, namespace)\n  /\nsum(rate(rest_client_requests_total{job=\"\
      apiserver\"}[5m])) by (cluster, instance, job, namespace))\n> 0.01"
    for: 15m
    labels:
      rackspace_com_coreAccountID: '5002029'
      rackspace_com_overseerID: '935811'
      severity: warning
