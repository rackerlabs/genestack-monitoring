groups:
- name: floating_ip_availability_alerts
  rules:
  - alert: flipAvailabilityCritical
    annotations:
      description: There are less than 20 floating IPs available to assign
      summary: Floating IPs available less than twenty
    expr: sum(last_over_time(openstack_neutron_network_ip_availabilities_total{network_name="PUBLICNET"}[1d]))
      - sum(last_over_time(openstack_neutron_network_ip_availabilities_used{network_name="PUBLICNET"}[1d]))
      < 20
    for: 5m
    labels:
      severity: critical
