groups:
- name: rabbitmq
  rules:
  - alert: RabbitmqDiskAlarm
    annotations:
      description: 'RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` disk alarm active.
        Publishers are blocked.

        '
      summary: 'A RabbitMQ node reached the `disk_free_limit` threshold.

        See https://www.rabbitmq.com/docs/alarms#overview, https://www.rabbitmq.com/docs/disk-alarms.

        '
    expr: "max by(rabbitmq_cluster) (\n  max_over_time(rabbitmq_alarms_free_disk_space_watermark[5m])\n\
      \  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster)\
      \ (rabbitmq_identity_info)\n) > 0\n"
    keep_firing_for: 5m
    labels:
      rulesgroup: rabbitmq
      severity: warning
