groups:
- name: rabbitmq
  rules:
  - alert: UnroutableMessages
    annotations:
      description: 'There were `{{ $value | printf "%.0f" }}` unroutable messages
        within the last

        5 minutes in RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` in namespace

        `{{ $labels.namespace }}`.

        '
      summary: 'There are messages published into an exchange which cannot be routed
        and are either dropped silently, or returned to publishers.

        Is your routing topology set up correctly?

        Check your application code and bindings between exchanges and queues.

        See

        https://www.rabbitmq.com/publishers.html#unroutable,

        https://www.rabbitmq.com/confirms.html#when-publishes-are-confirmed.

        '
    expr: 'sum by(namespace, rabbitmq_cluster) (increase(rabbitmq_channel_messages_unroutable_dropped_total[5m])
      * on (instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster)
      (rabbitmq_identity_info))

      >= 1

      or

      sum by(namespace, rabbitmq_cluster) (increase(rabbitmq_channel_messages_unroutable_returned_total[5m])
      * on (instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster)
      (rabbitmq_identity_info))

      >= 1

      '
    labels:
      rulesgroup: rabbitmq
      severity: warning
