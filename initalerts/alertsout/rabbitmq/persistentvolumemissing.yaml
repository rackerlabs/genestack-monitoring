groups:
- name: rabbitmq
  rules:
  - alert: PersistentVolumeMissing
    annotations:
      description: 'PersistentVolumeClaim `{{ $labels.persistentvolumeclaim }}` of

        RabbitMQ cluster `{{ $labels.label_app_kubernetes_io_name }}` in namespace

        `{{ $labels.namespace }}` is not bound.

        '
      summary: 'RabbitMQ needs a PersistentVolume for its data.

        However, there is no PersistentVolume bound to the PersistentVolumeClaim.

        This means the requested storage could not be provisioned.

        Check the status of the PersistentVolumeClaim: `kubectl -n {{ $labels.namespace
        }} describe pvc {{ $labels.persistentvolumeclaim }}`.

        '
    expr: 'kube_persistentvolumeclaim_status_phase{phase="Bound"} * on (namespace,
      persistentvolumeclaim) group_left(label_app_kubernetes_io_name) kube_persistentvolumeclaim_labels{label_app_kubernetes_io_component="rabbitmq"}

      ==

      0

      '
    for: 10m
    labels:
      rabbitmq_cluster: '{{ $labels.label_app_kubernetes_io_name }}'
      rulesgroup: rabbitmq
      severity: critical
