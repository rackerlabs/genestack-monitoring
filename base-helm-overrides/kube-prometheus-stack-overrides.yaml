defaultRules:
  additionalRuleLabels:
    rackspace_com_coreAccountID: '<core_account_id'
    rackspace_com_overseerID: 'env_overrseer_core_device_id>'

prometheus:
  prometheusSpec:
    externalLabels:
      cluster: kronos
      alert_dashboard: alertmanager.api.kronos.cloudmuchers.net
    additionalAlertRelabelConfigs:
      # If alert already has node, normalize to node_hostname
      - action: replace
        source_labels: [node]
        regex: "(.+)"
        target_label: node_hostname
        replacement: "$1"

      # Fallback for rules that use nodename
      - action: replace
        source_labels: [nodename]
        regex: "(.+)"
        target_label: node_hostname
        replacement: "$1"

      # Last fallback: derive host from instance (host:port)
      # Only applies when node_hostname is empty.
      - action: replace
        source_labels: [node_hostname, instance]
        regex: ";([^:]+)(?::[0-9]+)?"
        target_label: node_hostname
        replacement: "$1"

kube-state-metrics:
  extraArgs:
    - --metric-labels-allowlist=nodes=[rackspace.com/coreDeviceID]

alertmanager:
  config:
    route:
      group_by:
        - alertname
        - namespace
        - node_hostname
