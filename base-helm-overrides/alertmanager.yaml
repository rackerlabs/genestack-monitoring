global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'

receivers:
  # Configure your receivers here (email, slack, pagerduty, etc.)
  - name: 'default-receiver'

inhibit_rules:
  # When a host is down, suppress all other node alerts for that host
  - source_match:
      group_name: node-host-down
    target_match_re:
      group_name: ^(node-bonding-degraded|node-clock-not-synchronising|node-clock-skew-detected|node-cpu-high-usage|node-disk-io-saturation|node-file-descriptor-limit|node-filesystem-almost-out-of-files|node-filesystem-almost-out-of-space|node-filesystem-files-filling-up|node-filesystem-space-filling-up|node-high-number-conntrack-entries-used|node-memory-high-utilization|node-memory-major-pages-faults|node-network-interface-flapping|node-network-receive-errs|node-network-transmit-errs|node-raid-degraded|node-raid-disk-failure|node-system-saturation|node-systemd-service-crash-looping|node-systemd-service-failed|node-textfile-collector-scrape-error)$
    equal:
      - instance
      - node_hostname

  # When a Kubernetes node is NotReady, suppress node-level and pod-level alerts from that node
  - source_match:
      group_name: kube-node-not-ready
    target_match_re:
      group_name: ^(kubelet-down|kubelet-too-many-pods|kubelet-pleg-duration-high|kubelet-pod-startup-latency-high|kubelet-client-certificate-expiration|kubelet-client-certificate-renewal-errors|kubelet-server-certificate-expiration|kubelet-server-certificate-renewal-errors|kube-proxy-down|cpu-throttling-high|kube-node-pressure|kube-node-unreachable|kube-node-readiness-flapping|kube-node-eviction|kube-pod-not-ready|kube-pod-crash-looping|kube-container-waiting|kube-pod-container-restarts)$
    equal:
      - node
      - instance

  # When the critical pod restart alert fires, suppress the warning for the same pod container.
  - source_match:
      group_name: kube-pod-container-restarts
      severity: critical
    target_match:
      group_name: kube-pod-container-restarts
      severity: warning
    equal:
      - cluster
      - namespace
      - pod
      - container

  # When an etcd critical alert fires, suppress the warning for the same etcd target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^etcd-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^etcd-.+$
    equal:
      - cluster
      - job
      - instance

  # When a blackbox critical alert fires, suppress the warning for the same target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^blackbox-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^blackbox-.+$
    equal:
      - cluster
      - job
      - instance
      - target

  # When a MariaDB critical alert fires, suppress the warning for the same target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^mariadb-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^mariadb-.+$
    equal:
      - cluster
      - job
      - instance

  # When a Kubernetes critical alert fires, suppress the warning for the same target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^(kube-.+|kubelet-.+|cpu-throttling-high)$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^(kube-.+|kubelet-.+|cpu-throttling-high)$
    equal:
      - cluster
      - job
      - instance
      - namespace
      - node
      - pod
      - container
      - persistentvolumeclaim
      - daemonset
      - deployment
      - statefulset
      - horizontalpodautoscaler
      - replicaset
      - endpoint
      - service
      - quota
      - resourcequota

  # When a node critical alert fires, suppress the warning for the same host.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^node-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^node-.+$
    equal:
      - cluster
      - job
      - instance
      - node_hostname
      - device
      - mountpoint
      - interface
      - name

  # When a promoted node critical alert fires, suppress the warning for the same host.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^node-(md|dm|nvme).+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^node-(md|dm|nvme).+$
    equal:
      - instance
      - node_hostname

  # When an OpenStack critical alert fires, suppress the warning for the same target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^openstack-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^openstack-.+$
    equal:
      - cluster
      - job
      - instance
      - namespace
      - service
      - vhost
      - id
      - name

  # When an OVN critical alert fires, suppress the warning for the same backup target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^ovn-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^ovn-.+$
    equal:
      - cluster
      - job
      - instance

  # When a Prometheus-stack critical alert fires, suppress the warning for the same target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^(alertmanager|config-reloaders|prometheus|prometheus-operator).+$|^target-down$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^(alertmanager|config-reloaders|prometheus|prometheus-operator).+$|^target-down$
    equal:
      - cluster
      - job
      - instance
      - namespace
      - service
      - controller
      - integration
      - alertmanager
      - url

  # When a RabbitMQ critical alert fires, suppress the warning for the same target.
  - source_match:
      severity: critical
    source_match_re:
      group_name: ^rabbitmq-.+$
    target_match:
      severity: warning
    target_match_re:
      group_name: ^rabbitmq-.+$
    equal:
      - cluster
      - namespace
      - rabbitmq_cluster
      - rabbitmq_node
      - pod
      - queue
      - vhost
      - statefulset
      - persistentvolumeclaim
      - container

  # When a HPA ciritical alert fires, supress the warning for the same target
  - source_matchers:
      - severity="critical"
      - group_name="kube-hpa-maxed-out"
    target_matchers:
      - severity="warning"
      - group_name="kube-hpa-maxed-out"
    equal:
      - namespace
      - horizontalpodautoscaler

  # When a Kube Job Failed critical alert fires, supress the warning for the same target
  - source_matchers:
      - severity="critical"
      - group_name="kube-job-failed"
    target_matchers:
      - severity="warning"
      - group_name="kube-job-failed"
    equal:
      - namespace
      - job_name
      - reason
