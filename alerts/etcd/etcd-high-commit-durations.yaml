additionalPrometheusRulesMap:
  etcd-high-commit-durations:
    groups:
      - name: etcd-high-commit-durations
        rules:
          - alert: etcd-high-commit-durations-warning
            expr: >-
              histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.25
            for: 10m
            labels:
              severity: warning
              group_name: etcd-high-commit-durations
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": 99th percentile commit durations {{ $value }}s on etcd instance {{ $labels.instance }}.'
              summary: etcd cluster 99th percentile commit durations are too high.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-high-commit-durations-critical
            expr: >-
              histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.25
            for: 15m
            labels:
              severity: critical
              group_name: etcd-high-commit-durations
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": 99th percentile commit durations {{ $value }}s on etcd instance {{ $labels.instance }}.'
              summary: etcd cluster 99th percentile commit durations are too high.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
