additionalPrometheusRulesMap:
  etcd-members-down:
    groups:
      - name: etcd-members-down
        rules:
          - alert: etcd-members-down-warning
            expr: >-
              max without (endpoint) ( sum without (instance, pod) (up{job=~".*etcd.*"} == bool 0) or count without (To) ( sum without (instance, pod) (rate(etcd_network_peer_sent_failures_total{job=~".*etcd.*"}[120s])) > 0.01 ) ) > 0
            for: 20m
            labels:
              severity: warning
              group_name: etcd-members-down
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": members are down ({{ $value }}).'
              summary: etcd cluster members are down.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-members-down-critical
            expr: >-
              max without (endpoint) ( sum without (instance, pod) (up{job=~".*etcd.*"} == bool 0) or count without (To) ( sum without (instance, pod) (rate(etcd_network_peer_sent_failures_total{job=~".*etcd.*"}[120s])) > 0.01 ) ) > 0
            for: 30m
            labels:
              severity: critical
              group_name: etcd-members-down
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": members are down ({{ $value }}).'
              summary: etcd cluster members are down.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
