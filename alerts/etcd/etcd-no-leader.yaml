additionalPrometheusRulesMap:
  etcd-no-leader:
    groups:
      - name: etcd-no-leader
        rules:
          - alert: etcd-no-leader-warning
            expr: >-
              etcd_server_has_leader{job=~".*etcd.*"} == 0
            for: 1m
            labels:
              severity: warning
              group_name: etcd-no-leader
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": member {{ $labels.instance }} has no leader. This warning
                alert fires after 1m.
              summary: etcd cluster has no leader.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-no-leader-critical
            expr: >-
              etcd_server_has_leader{job=~".*etcd.*"} == 0
            for: 5m
            labels:
              severity: critical
              group_name: etcd-no-leader
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": member {{ $labels.instance }} has no leader. This critical
                alert fires after 5m.
              summary: etcd cluster has no leader.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
