additionalPrometheusRulesMap:
  etcd-excessive-database-growth:
    groups:
      - name: etcd-excessive-database-growth
        rules:
          - alert: etcd-excessive-database-growth-warning
            expr: >-
              predict_linear(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[4h], 4 * 60 * 60) > etcd_server_quota_backend_bytes{job=~".*etcd.*"}
            for: 10m
            labels:
              severity: warning
              group_name: etcd-excessive-database-growth
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": Predicting running out of disk space in the next four hours,
                based on write observations within the past four hours on etcd instance {{ $labels.instance }},
                please check as it might be disruptive. This warning alert fires after 10m.
              summary: etcd cluster database growing very fast.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-excessive-database-growth-critical
            expr: >-
              predict_linear(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[4h], 4 * 60 * 60) > etcd_server_quota_backend_bytes{job=~".*etcd.*"}
            for: 10m
            labels:
              severity: critical
              group_name: etcd-excessive-database-growth
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": Predicting running out of disk space in the next four hours,
                based on write observations within the past four hours on etcd instance {{ $labels.instance }},
                please check as it might be disruptive. This critical alert fires after 10m.
              summary: etcd cluster database growing very fast.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
