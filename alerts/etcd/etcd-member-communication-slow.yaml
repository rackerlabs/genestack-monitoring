additionalPrometheusRulesMap:
  etcd-member-communication-slow:
    groups:
      - name: etcd-member-communication-slow
        rules:
          - alert: etcd-member-communication-slow-warning
            expr: >-
              histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.15
            for: 10m
            labels:
              severity: warning
              group_name: etcd-member-communication-slow
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": member communication with {{ $labels.To }} is taking {{ $value }}s on etcd instance {{ $labels.instance }}.'
              summary: etcd cluster member communication is slow.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-member-communication-slow-critical
            expr: >-
              histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.15
            for: 15m
            labels:
              severity: critical
              group_name: etcd-member-communication-slow
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": member communication with {{ $labels.To }} is taking {{ $value }}s on etcd instance {{ $labels.instance }}.'
              summary: etcd cluster member communication is slow.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
