additionalPrometheusRulesMap:
  etcd-database-high-fragmentation-ratio:
    groups:
      - name: etcd-database-high-fragmentation-ratio
        rules:
          - alert: etcd-database-high-fragmentation-ratio-warning
            expr: >-
              (last_over_time(etcd_mvcc_db_total_size_in_use_in_bytes{job=~".*etcd.*"}[5m]) / last_over_time(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[5m])) < 0.5 and etcd_mvcc_db_total_size_in_use_in_bytes{job=~".*etcd.*"} > 104857600
            for: 10m
            labels:
              severity: warning
              group_name: etcd-database-high-fragmentation-ratio
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": database size in use on instance {{ $labels.instance }} is {{ $value | humanizePercentage }} of the actual allocated disk space, please run defragmentation (e.g. etcdctl defrag) to retrieve the unused fragmented disk space.'
              runbook_url: default_runbook_url
              summary: etcd database size in use is less than 50% of the actual allocated storage.
              dashboard_url: default_dashboard_url
          - alert: etcd-database-high-fragmentation-ratio-critical
            expr: >-
              (last_over_time(etcd_mvcc_db_total_size_in_use_in_bytes{job=~".*etcd.*"}[5m]) / last_over_time(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[5m])) < 0.5 and etcd_mvcc_db_total_size_in_use_in_bytes{job=~".*etcd.*"} > 104857600
            for: 15m
            labels:
              severity: critical
              group_name: etcd-database-high-fragmentation-ratio
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: 'etcd cluster "{{ $labels.job }}": database size in use on instance {{ $labels.instance }} is {{ $value | humanizePercentage }} of the actual allocated disk space, please run defragmentation (e.g. etcdctl defrag) to retrieve the unused fragmented disk space.'
              runbook_url: default_runbook_url
              summary: etcd database size in use is less than 50% of the actual allocated storage.
              dashboard_url: default_dashboard_url
