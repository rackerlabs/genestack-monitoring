additionalPrometheusRulesMap:
  etcd-high-fsync-durations:
    groups:
      - name: etcd-high-fsync-durations
        rules:
          - alert: etcd-high-fsync-durations-warning
            expr: >-
              histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 1
            for: 10m
            labels:
              severity: warning
              group_name: etcd-high-fsync-durations
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": 99th percentile fsync durations are {{ $value }}s on etcd
                instance {{ $labels.instance }}. This warning alert fires after 10m.
              summary: etcd cluster 99th percentile fsync durations are too high.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-high-fsync-durations-critical
            expr: >-
              histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 1
            for: 10m
            labels:
              severity: critical
              group_name: etcd-high-fsync-durations
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": 99th percentile fsync durations are {{ $value }}s on etcd
                instance {{ $labels.instance }}. This critical alert fires after 10m.
              summary: etcd cluster 99th percentile fsync durations are too high.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
