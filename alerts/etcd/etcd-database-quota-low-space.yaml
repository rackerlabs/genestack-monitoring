additionalPrometheusRulesMap:
  etcd-database-quota-low-space:
    groups:
      - name: etcd-database-quota-low-space
        rules:
          - alert: etcd-database-quota-low-space-warning
            expr: >-
              (last_over_time(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[5m]) / last_over_time(etcd_server_quota_backend_bytes{job=~".*etcd.*"}[5m])) * 100 > 95
            for: 10m
            labels:
              severity: warning
              group_name: etcd-database-quota-low-space
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": database size exceeds the defined quota on etcd instance {{
                $labels.instance }}, please defrag or increase the quota as the writes to etcd will be disabled
                when it is full. This warning alert fires after 10m.
              summary: etcd cluster database is running full.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
          - alert: etcd-database-quota-low-space-critical
            expr: >-
              (last_over_time(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[5m]) / last_over_time(etcd_server_quota_backend_bytes{job=~".*etcd.*"}[5m])) * 100 > 95
            for: 10m
            labels:
              severity: critical
              group_name: etcd-database-quota-low-space
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                etcd cluster "{{ $labels.job }}": database size exceeds the defined quota on etcd instance {{
                $labels.instance }}, please defrag or increase the quota as the writes to etcd will be disabled
                when it is full. This critical alert fires after 10m.
              summary: etcd cluster database is running full.
              runbook_url: default_runbook_url
              dashboard_url: default_dashboard_url
