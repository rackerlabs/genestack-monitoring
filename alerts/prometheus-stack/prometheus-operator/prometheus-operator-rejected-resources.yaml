additionalPrometheusRulesMap:
  prometheus-operator-rejected-resources:
    groups:
    - name: prometheus-operator-rejected-resources
      rules:
      - alert: prometheus-operator-rejected-resources-warning
        expr: min_over_time(prometheus_operator_managed_resources{state="rejected"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          group_name: prometheus-operator-rejected-resources
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus operator in {{ $labels.namespace }} namespace rejected {{ printf "%0.0f" $value }} {{
            $labels.controller }}/{{ $labels.resource }} resources. This warning alert fires after 5m.
          runbook_url: default_runbook_url
          summary: Resources rejected by Prometheus operator
          dashboard_url: default_dashboard_url
      - alert: prometheus-operator-rejected-resources-critical
        expr: min_over_time(prometheus_operator_managed_resources{state="rejected"}[5m]) > 0
        for: 10m
        labels:
          severity: critical
          group_name: prometheus-operator-rejected-resources
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus operator in {{ $labels.namespace }} namespace rejected {{ printf "%0.0f" $value }} {{
            $labels.controller }}/{{ $labels.resource }} resources. This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Resources rejected by Prometheus operator
          dashboard_url: default_dashboard_url
