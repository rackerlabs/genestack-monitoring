additionalPrometheusRulesMap:
  prometheusoperatorreconcileerrors:
    groups:
    - name: prometheusoperatorreconcileerrors
      rules:
      - alert: prometheusoperatorreconcileerrors-warning
        expr: (sum by (cluster,controller,namespace) (rate(prometheus_operator_reconcile_errors_total{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]))) / (sum by (cluster,controller,namespace) (rate(prometheus_operator_reconcile_operations_total{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]))) > 0.1
        for: 10m
        labels:
          severity: warning
          group_name: prometheusoperatorreconcileerrors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '{{ $value | humanizePercentage }} of reconciling operations failed for {{ $labels.controller }} controller in {{ $labels.namespace }} namespace.'
          runbook_url: default_runbook_url
          summary: Errors while reconciling objects.
          dashboard_url: default_dashboard_url
      - alert: prometheusoperatorreconcileerrors-critical
        expr: (sum by (cluster,controller,namespace) (rate(prometheus_operator_reconcile_errors_total{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]))) / (sum by (cluster,controller,namespace) (rate(prometheus_operator_reconcile_operations_total{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]))) > 0.1
        for: 15m
        labels:
          severity: critical
          group_name: prometheusoperatorreconcileerrors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '{{ $value | humanizePercentage }} of reconciling operations failed for {{ $labels.controller }} controller in {{ $labels.namespace }} namespace.'
          runbook_url: default_runbook_url
          summary: Errors while reconciling objects.
          dashboard_url: default_dashboard_url
