additionalPrometheusRulesMap:
  prometheus-operator-not-ready:
    groups:
    - name: prometheus-operator-not-ready
      rules:
      - alert: prometheus-operator-not-ready-warning
        expr: min by (cluster,controller,namespace) (max_over_time(prometheus_operator_ready[5m]) == 0)
        for: 5m
        labels:
          severity: warning
          group_name: prometheus-operator-not-ready
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus operator in {{ $labels.namespace }} namespace isn't ready to reconcile {{
            $labels.controller }} resources. This warning alert fires after 5m.
          runbook_url: default_runbook_url
          summary: Prometheus operator not ready
          dashboard_url: default_dashboard_url
      - alert: prometheus-operator-not-ready-critical
        expr: min by (cluster,controller,namespace) (max_over_time(prometheus_operator_ready[5m]) == 0)
        for: 10m
        labels:
          severity: critical
          group_name: prometheus-operator-not-ready
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus operator in {{ $labels.namespace }} namespace isn't ready to reconcile {{
            $labels.controller }} resources. This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Prometheus operator not ready
          dashboard_url: default_dashboard_url
