additionalPrometheusRulesMap:
  prometheusoperatornotready:
    groups:
    - name: prometheusoperatornotready
      rules:
      - alert: prometheusoperatornotready-warning
        expr: min by (cluster,controller,namespace) (max_over_time(prometheus_operator_ready{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]) == 0)
        for: 5m
        labels:
          severity: warning
          group_name: prometheusoperatornotready
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus operator in {{ $labels.namespace }} namespace isn't ready to reconcile {{ $labels.controller }} resources.
          runbook_url: default_runbook_url
          summary: Prometheus operator not ready
          dashboard_url: default_dashboard_url
      - alert: prometheusoperatornotready-critical
        expr: min by (cluster,controller,namespace) (max_over_time(prometheus_operator_ready{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]) == 0)
        for: 15m
        labels:
          severity: critical
          group_name: prometheusoperatornotready
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus operator in {{ $labels.namespace }} namespace isn't ready to reconcile {{ $labels.controller }} resources.
          runbook_url: default_runbook_url
          summary: Prometheus operator not ready
          dashboard_url: default_dashboard_url
