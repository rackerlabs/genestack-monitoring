additionalPrometheusRulesMap:
  prometheusoperatorsyncfailed:
    groups:
    - name: prometheusoperatorsyncfailed
      rules:
      - alert: prometheusoperatorsyncfailed-warning
        expr: min_over_time(prometheus_operator_syncs{status="failed",job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]) > 0
        for: 10m
        labels:
          severity: warning
          group_name: prometheusoperatorsyncfailed
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Controller {{ $labels.controller }} in {{ $labels.namespace }} namespace fails to reconcile {{ $value }} objects.
          runbook_url: default_runbook_url
          summary: Last controller reconciliation failed
          dashboard_url: default_dashboard_url
      - alert: prometheusoperatorsyncfailed-critical
        expr: min_over_time(prometheus_operator_syncs{status="failed",job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]) > 0
        for: 15m
        labels:
          severity: critical
          group_name: prometheusoperatorsyncfailed
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Controller {{ $labels.controller }} in {{ $labels.namespace }} namespace fails to reconcile {{ $value }} objects.
          runbook_url: default_runbook_url
          summary: Last controller reconciliation failed
          dashboard_url: default_dashboard_url
