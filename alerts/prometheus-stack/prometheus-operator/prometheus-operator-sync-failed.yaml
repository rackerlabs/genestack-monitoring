additionalPrometheusRulesMap:
  prometheus-operator-sync-failed:
    groups:
    - name: prometheus-operator-sync-failed
      rules:
      - alert: prometheus-operator-sync-failed-warning
        expr: min_over_time(prometheus_operator_syncs{status="failed"}[5m]) > 0
        for: 10m
        labels:
          severity: warning
          group_name: prometheus-operator-sync-failed
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Controller {{ $labels.controller }} in {{ $labels.namespace }} namespace fails to reconcile {{
            $value }} objects. This warning alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Last controller reconciliation failed
          dashboard_url: default_dashboard_url
      - alert: prometheus-operator-sync-failed-critical
        expr: min_over_time(prometheus_operator_syncs{status="failed"}[5m]) > 0
        for: 10m
        labels:
          severity: critical
          group_name: prometheus-operator-sync-failed
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Controller {{ $labels.controller }} in {{ $labels.namespace }} namespace fails to reconcile {{
            $value }} objects. This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Last controller reconciliation failed
          dashboard_url: default_dashboard_url
