additionalPrometheusRulesMap:
  prometheusoperatornodelookuperrors:
    groups:
    - name: prometheusoperatornodelookuperrors
      rules:
      - alert: prometheusoperatornodelookuperrors-warning
        expr: rate(prometheus_operator_node_address_lookup_errors_total{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          group_name: prometheusoperatornodelookuperrors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Errors while reconciling Prometheus in {{ $labels.namespace }} Namespace.
          runbook_url: default_runbook_url
          summary: Errors while reconciling Prometheus.
          dashboard_url: default_dashboard_url
      - alert: prometheusoperatornodelookuperrors-critical
        expr: rate(prometheus_operator_node_address_lookup_errors_total{job="kube-prometheus-stack-operator",namespace="prometheus"}[5m]) > 0.1
        for: 15m
        labels:
          severity: critical
          group_name: prometheusoperatornodelookuperrors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Errors while reconciling Prometheus in {{ $labels.namespace }} Namespace.
          runbook_url: default_runbook_url
          summary: Errors while reconciling Prometheus.
          dashboard_url: default_dashboard_url
