additionalPrometheusRulesMap:
  prometheusduplicatetimestamps:
    groups:
    - name: prometheusduplicatetimestamps
      rules:
      - alert: prometheusduplicatetimestamps-warning
        expr: rate(prometheus_target_scrapes_sample_duplicate_timestamp_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m]) > 0
        for: 10m
        labels:
          severity: warning
          group_name: prometheusduplicatetimestamps
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} is dropping {{ printf "%.4g" $value  }} samples/s with different values but duplicated timestamp.
          runbook_url: default_runbook_url
          summary: Prometheus is dropping samples with duplicate timestamps.
          dashboard_url: default_dashboard_url
      - alert: prometheusduplicatetimestamps-critical
        expr: rate(prometheus_target_scrapes_sample_duplicate_timestamp_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m]) > 0
        for: 15m
        labels:
          severity: critical
          group_name: prometheusduplicatetimestamps
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} is dropping {{ printf "%.4g" $value  }} samples/s with different values but duplicated timestamp.
          runbook_url: default_runbook_url
          summary: Prometheus is dropping samples with duplicate timestamps.
          dashboard_url: default_dashboard_url
