additionalPrometheusRulesMap:
  prometheuserrorsendingalertstoanyalertmanager:
    groups:
    - name: prometheuserrorsendingalertstoanyalertmanager
      rules:
      - alert: prometheuserrorsendingalertstoanyalertmanager-warning
        expr: "min without (alertmanager) (\n  rate(prometheus_notifications_errors_total{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\",alertmanager!~``}[5m])\n/\n  rate(prometheus_notifications_sent_total{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\",alertmanager!~``}[5m])\n)\n* 100\n> 3"
        for: 15m
        labels:
          severity: warning
          group_name: prometheuserrorsendingalertstoanyalertmanager
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '{{ printf "%.1f" $value }}% minimum errors while sending alerts from Prometheus {{$labels.namespace}}/{{$labels.pod}} to any Alertmanager.'
          runbook_url: default_runbook_url
          summary: Prometheus encounters more than 3% errors sending alerts to any Alertmanager.
          dashboard_url: default_dashboard_url
      - alert: prometheuserrorsendingalertstoanyalertmanager-critical
        expr: "min without (alertmanager) (\n  rate(prometheus_notifications_errors_total{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\",alertmanager!~``}[5m])\n/\n  rate(prometheus_notifications_sent_total{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\",alertmanager!~``}[5m])\n)\n* 100\n> 3"
        for: 30m
        labels:
          severity: critical
          group_name: prometheuserrorsendingalertstoanyalertmanager
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '{{ printf "%.1f" $value }}% minimum errors while sending alerts from Prometheus {{$labels.namespace}}/{{$labels.pod}} to any Alertmanager.'
          runbook_url: default_runbook_url
          summary: Prometheus encounters more than 3% errors sending alerts to any Alertmanager.
          dashboard_url: default_dashboard_url
