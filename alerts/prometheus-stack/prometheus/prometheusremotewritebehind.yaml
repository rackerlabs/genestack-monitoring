additionalPrometheusRulesMap:
  prometheusremotewritebehind:
    groups:
    - name: prometheusremotewritebehind
      rules:
      - alert: prometheusremotewritebehind-warning
        expr: "# Without max_over_time, failed scrapes could create false negatives, see\n# https://www.robustperception.io/alerting-on-gauges-in-prometheus-2-0 for details.\n(\n  max_over_time(prometheus_remote_storage_queue_highest_timestamp_seconds{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\"}[5m])\n-\n  max_over_time(prometheus_remote_storage_queue_highest_sent_timestamp_seconds{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\"}[5m])\n)\n> 120"
        for: 15m
        labels:
          severity: warning
          group_name: prometheusremotewritebehind
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} remote write is {{ printf "%.1f" $value }}s behind for {{ $labels.remote_name}}:{{ $labels.url }}.
          runbook_url: default_runbook_url
          summary: Prometheus remote write is behind.
          dashboard_url: default_dashboard_url
      - alert: prometheusremotewritebehind-critical
        expr: "# Without max_over_time, failed scrapes could create false negatives, see\n# https://www.robustperception.io/alerting-on-gauges-in-prometheus-2-0 for details.\n(\n  max_over_time(prometheus_remote_storage_queue_highest_timestamp_seconds{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\"}[5m])\n-\n  max_over_time(prometheus_remote_storage_queue_highest_sent_timestamp_seconds{job=\"kube-prometheus-stack-prometheus\",namespace=\"prometheus\"}[5m])\n)\n> 120"
        for: 30m
        labels:
          severity: critical
          group_name: prometheusremotewritebehind
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} remote write is {{ printf "%.1f" $value }}s behind for {{ $labels.remote_name}}:{{ $labels.url }}.
          runbook_url: default_runbook_url
          summary: Prometheus remote write is behind.
          dashboard_url: default_dashboard_url
