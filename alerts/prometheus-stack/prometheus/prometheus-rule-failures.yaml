additionalPrometheusRulesMap:
  prometheus-rule-failures:
    groups:
    - name: prometheus-rule-failures
      rules:
      - alert: prometheus-rule-failures-warning
        expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-rule-failures
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed to evaluate {{ printf "%.0f" $value
            }} rules in the last 5m. This warning alert fires after 15m.
          runbook_url: default_runbook_url
          summary: Prometheus is failing rule evaluations.
          dashboard_url: default_dashboard_url
      - alert: prometheus-rule-failures-critical
        expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-rule-failures
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed to evaluate {{ printf "%.0f" $value
            }} rules in the last 5m. This critical alert fires after 30m.
          runbook_url: default_runbook_url
          summary: Prometheus is failing rule evaluations.
          dashboard_url: default_dashboard_url
