additionalPrometheusRulesMap:
  prometheus-errors-sending-alerts-to-any-alertmanager:
    groups:
    - name: prometheus-errors-sending-alerts-to-any-alertmanager
      rules:
      - alert: prometheus-errors-sending-alerts-to-any-alertmanager-warning
        expr: min without (alertmanager) (rate(prometheus_notifications_errors_total{alertmanager!~``}[5m]) /  rate(prometheus_notifications_sent_total{alertmanager!~``}[5m])) * 100 > 3
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-errors-sending-alerts-to-any-alertmanager
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            {{ printf "%.1f" $value }}% minimum errors while sending alerts from Prometheus
            {{$labels.namespace}}/{{$labels.pod}} to any Alertmanager. This warning alert fires after 15m.
          runbook_url: default_runbook_url
          summary: Prometheus encounters more than 3% errors sending alerts to any Alertmanager.
          dashboard_url: default_dashboard_url
      - alert: prometheus-errors-sending-alerts-to-any-alertmanager-critical
        expr: min without (alertmanager) (rate(prometheus_notifications_errors_total{alertmanager!~``}[5m]) /  rate(prometheus_notifications_sent_total{alertmanager!~``}[5m])) * 100 > 3
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-errors-sending-alerts-to-any-alertmanager
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            {{ printf "%.1f" $value }}% minimum errors while sending alerts from Prometheus
            {{$labels.namespace}}/{{$labels.pod}} to any Alertmanager. This critical alert fires after 30m.
          runbook_url: default_runbook_url
          summary: Prometheus encounters more than 3% errors sending alerts to any Alertmanager.
          dashboard_url: default_dashboard_url
