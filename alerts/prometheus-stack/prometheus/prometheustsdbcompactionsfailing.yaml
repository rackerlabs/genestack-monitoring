additionalPrometheusRulesMap:
  prometheustsdbcompactionsfailing:
    groups:
    - name: prometheustsdbcompactionsfailing
      rules:
      - alert: prometheustsdbcompactionsfailing-warning
        expr: increase(prometheus_tsdb_compactions_failed_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[3h]) > 0
        for: 4h
        labels:
          severity: warning
          group_name: prometheustsdbcompactionsfailing
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has detected {{$value | humanize}} compaction failures over the last 3h.
          runbook_url: default_runbook_url
          summary: Prometheus has issues compacting blocks.
          dashboard_url: default_dashboard_url
      - alert: prometheustsdbcompactionsfailing-critical
        expr: increase(prometheus_tsdb_compactions_failed_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[3h]) > 0
        for: 15m
        labels:
          severity: critical
          group_name: prometheustsdbcompactionsfailing
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has detected {{$value | humanize}} compaction failures over the last 3h.
          runbook_url: default_runbook_url
          summary: Prometheus has issues compacting blocks.
          dashboard_url: default_dashboard_url
