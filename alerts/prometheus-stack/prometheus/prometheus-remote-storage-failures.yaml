additionalPrometheusRulesMap:
  prometheus-remote-storage-failures:
    groups:
    - name: prometheus-remote-storage-failures
      rules:
      - alert: prometheus-remote-storage-failures-warning
        expr: ((rate(prometheus_remote_storage_failed_samples_total[5m]) or rate(prometheus_remote_storage_samples_failed_total[5m])) /  ((rate(prometheus_remote_storage_failed_samples_total[5m]) or rate(prometheus_remote_storage_samples_failed_total[5m])) +  (rate(prometheus_remote_storage_succeeded_samples_total[5m]) or rate(prometheus_remote_storage_samples_total[5m])))) * 100 > 1
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-remote-storage-failures
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} failed to send {{ printf "%.1f" $value }}% of
            the samples to {{ $labels.remote_name}}:{{ $labels.url }}. This warning alert fires after 15m.
          runbook_url: default_runbook_url
          summary: Prometheus fails to send samples to remote storage.
          dashboard_url: default_dashboard_url
      - alert: prometheus-remote-storage-failures-critical
        expr: ((rate(prometheus_remote_storage_failed_samples_total[5m]) or rate(prometheus_remote_storage_samples_failed_total[5m])) /  ((rate(prometheus_remote_storage_failed_samples_total[5m]) or rate(prometheus_remote_storage_samples_failed_total[5m])) +  (rate(prometheus_remote_storage_succeeded_samples_total[5m]) or rate(prometheus_remote_storage_samples_total[5m])))) * 100 > 1
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-remote-storage-failures
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} failed to send {{ printf "%.1f" $value }}% of
            the samples to {{ $labels.remote_name}}:{{ $labels.url }}. This critical alert fires after 30m.
          runbook_url: default_runbook_url
          summary: Prometheus fails to send samples to remote storage.
          dashboard_url: default_dashboard_url
