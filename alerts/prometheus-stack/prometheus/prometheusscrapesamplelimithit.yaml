additionalPrometheusRulesMap:
  prometheusscrapesamplelimithit:
    groups:
    - name: prometheusscrapesamplelimithit
      rules:
      - alert: prometheusscrapesamplelimithit-warning
        expr: increase(prometheus_target_scrapes_exceeded_sample_limit_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m]) > 0
        for: 15m
        labels:
          severity: warning
          group_name: prometheusscrapesamplelimithit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed {{ printf "%.0f" $value }} scrapes in the last 5m because some targets exceeded the configured sample_limit.
          runbook_url: default_runbook_url
          summary: Prometheus has failed scrapes that have exceeded the configured sample limit.
          dashboard_url: default_dashboard_url
      - alert: prometheusscrapesamplelimithit-critical
        expr: increase(prometheus_target_scrapes_exceeded_sample_limit_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m]) > 0
        for: 30m
        labels:
          severity: critical
          group_name: prometheusscrapesamplelimithit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed {{ printf "%.0f" $value }} scrapes in the last 5m because some targets exceeded the configured sample_limit.
          runbook_url: default_runbook_url
          summary: Prometheus has failed scrapes that have exceeded the configured sample limit.
          dashboard_url: default_dashboard_url
