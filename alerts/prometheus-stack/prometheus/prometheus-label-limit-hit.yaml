additionalPrometheusRulesMap:
  prometheus-label-limit-hit:
    groups:
    - name: prometheus-label-limit-hit
      rules:
      - alert: prometheus-label-limit-hit-warning
        expr: increase(prometheus_target_scrape_pool_exceeded_label_limits_total[5m]) > 0
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-label-limit-hit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has dropped {{ printf "%.0f" $value }} targets
            because some samples exceeded the configured label_limit, label_name_length_limit or
            label_value_length_limit. This warning alert fires after 15m.
          runbook_url: default_runbook_url
          summary: Prometheus has dropped targets because some scrape configs have exceeded the labels limit.
          dashboard_url: default_dashboard_url
      - alert: prometheus-label-limit-hit-critical
        expr: increase(prometheus_target_scrape_pool_exceeded_label_limits_total[5m]) > 0
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-label-limit-hit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has dropped {{ printf "%.0f" $value }} targets
            because some samples exceeded the configured label_limit, label_name_length_limit or
            label_value_length_limit. This critical alert fires after 30m.
          runbook_url: default_runbook_url
          summary: Prometheus has dropped targets because some scrape configs have exceeded the labels limit.
          dashboard_url: default_dashboard_url
