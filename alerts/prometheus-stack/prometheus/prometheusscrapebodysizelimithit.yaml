additionalPrometheusRulesMap:
  prometheusscrapebodysizelimithit:
    groups:
    - name: prometheusscrapebodysizelimithit
      rules:
      - alert: prometheusscrapebodysizelimithit-warning
        expr: increase(prometheus_target_scrapes_exceeded_body_size_limit_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m]) > 0
        for: 15m
        labels:
          severity: warning
          group_name: prometheusscrapebodysizelimithit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed {{ printf "%.0f" $value }} scrapes in the last 5m because some targets exceeded the configured body_size_limit.
          runbook_url: default_runbook_url
          summary: Prometheus has dropped some targets that exceeded body size limit.
          dashboard_url: default_dashboard_url
      - alert: prometheusscrapebodysizelimithit-critical
        expr: increase(prometheus_target_scrapes_exceeded_body_size_limit_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m]) > 0
        for: 30m
        labels:
          severity: critical
          group_name: prometheusscrapebodysizelimithit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed {{ printf "%.0f" $value }} scrapes in the last 5m because some targets exceeded the configured body_size_limit.
          runbook_url: default_runbook_url
          summary: Prometheus has dropped some targets that exceeded body size limit.
          dashboard_url: default_dashboard_url
