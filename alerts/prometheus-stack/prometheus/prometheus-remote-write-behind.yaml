additionalPrometheusRulesMap:
  prometheus-remote-write-behind:
    groups:
    - name: prometheus-remote-write-behind
      rules:
      - alert: prometheus-remote-write-behind-warning
        expr: (max_over_time(prometheus_remote_storage_queue_highest_timestamp_seconds[5m]) -  max_over_time(prometheus_remote_storage_queue_highest_sent_timestamp_seconds[5m])) > 120
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-remote-write-behind
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} remote write is {{ printf "%.1f" $value }}s
            behind for {{ $labels.remote_name}}:{{ $labels.url }}. This warning alert fires after 15m.
          runbook_url: default_runbook_url
          summary: Prometheus remote write is behind.
          dashboard_url: default_dashboard_url
      - alert: prometheus-remote-write-behind-critical
        expr: (max_over_time(prometheus_remote_storage_queue_highest_timestamp_seconds[5m]) -  max_over_time(prometheus_remote_storage_queue_highest_sent_timestamp_seconds[5m])) > 120
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-remote-write-behind
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} remote write is {{ printf "%.1f" $value }}s
            behind for {{ $labels.remote_name}}:{{ $labels.url }}. This critical alert fires after 30m.
          runbook_url: default_runbook_url
          summary: Prometheus remote write is behind.
          dashboard_url: default_dashboard_url
