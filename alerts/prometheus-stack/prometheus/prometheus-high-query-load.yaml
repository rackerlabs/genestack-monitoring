additionalPrometheusRulesMap:
  prometheus-high-query-load:
    groups:
    - name: prometheus-high-query-load
      rules:
      - alert: prometheus-high-query-load-warning
        expr: avg_over_time(prometheus_engine_queries[5m]) / max_over_time(prometheus_engine_queries_concurrent_max[5m]) > 0.8
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-high-query-load
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} query API has had less than 20% available
            capacity in its query engine for the last 15 minutes.
          runbook_url: default_runbook_url
          summary: Prometheus is reaching its maximum capacity serving concurrent requests.
          dashboard_url: default_dashboard_url
      - alert: prometheus-high-query-load-critical
        expr: avg_over_time(prometheus_engine_queries[5m]) / max_over_time(prometheus_engine_queries_concurrent_max[5m]) > 0.8
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-high-query-load
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} query API has had less than 20% available
            capacity in its query engine for the last 30 minutes.
          runbook_url: default_runbook_url
          summary: Prometheus is reaching its maximum capacity serving concurrent requests.
          dashboard_url: default_dashboard_url
