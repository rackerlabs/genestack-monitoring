additionalPrometheusRulesMap:
  prometheus-scrape-body-size-limit-hit:
    groups:
    - name: prometheus-scrape-body-size-limit-hit
      rules:
      - alert: prometheus-scrape-body-size-limit-hit-warning
        expr: increase(prometheus_target_scrapes_exceeded_body_size_limit_total[5m]) > 0
        for: 15m
        labels:
          severity: warning
          group_name: prometheus-scrape-body-size-limit-hit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed {{ printf "%.0f" $value }} scrapes
            in the last 5m because some targets exceeded the configured body_size_limit. This warning alert
            fires after 15m.
          runbook_url: default_runbook_url
          summary: Prometheus has dropped some targets that exceeded body size limit.
          dashboard_url: default_dashboard_url
      - alert: prometheus-scrape-body-size-limit-hit-critical
        expr: increase(prometheus_target_scrapes_exceeded_body_size_limit_total[5m]) > 0
        for: 30m
        labels:
          severity: critical
          group_name: prometheus-scrape-body-size-limit-hit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed {{ printf "%.0f" $value }} scrapes
            in the last 5m because some targets exceeded the configured body_size_limit. This critical alert
            fires after 30m.
          runbook_url: default_runbook_url
          summary: Prometheus has dropped some targets that exceeded body size limit.
          dashboard_url: default_dashboard_url
