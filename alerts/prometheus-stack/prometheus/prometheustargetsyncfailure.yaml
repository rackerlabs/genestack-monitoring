additionalPrometheusRulesMap:
  prometheustargetsyncfailure:
    groups:
    - name: prometheustargetsyncfailure
      rules:
      - alert: prometheustargetsyncfailure-warning
        expr: increase(prometheus_target_sync_failed_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[30m]) > 0
        for: 5m
        labels:
          severity: warning
          group_name: prometheustargetsyncfailure
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '{{ printf "%.0f" $value }} targets in Prometheus {{$labels.namespace}}/{{$labels.pod}} have failed to sync because invalid configuration was supplied.'
          runbook_url: default_runbook_url
          summary: Prometheus has failed to sync targets.
          dashboard_url: default_dashboard_url
      - alert: prometheustargetsyncfailure-critical
        expr: increase(prometheus_target_sync_failed_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[30m]) > 0
        for: 15m
        labels:
          severity: critical
          group_name: prometheustargetsyncfailure
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '{{ printf "%.0f" $value }} targets in Prometheus {{$labels.namespace}}/{{$labels.pod}} have failed to sync because invalid configuration was supplied.'
          runbook_url: default_runbook_url
          summary: Prometheus has failed to sync targets.
          dashboard_url: default_dashboard_url
