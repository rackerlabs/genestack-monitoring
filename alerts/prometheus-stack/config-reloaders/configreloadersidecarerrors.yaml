additionalPrometheusRulesMap:
  configreloadersidecarerrors:
    groups:
    - name: configreloadersidecarerrors
      rules:
      - alert: configreloadersidecarerrors-warning
        expr: max_over_time(reloader_last_reload_successful{namespace=~".+"}[5m]) == 0
        for: 10m
        labels:
          severity: warning
          group_name: configreloadersidecarerrors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'Errors encountered while the {{$labels.pod}} config-reloader sidecar attempts to sync config in {{$labels.namespace}} namespace.

            As a result, configuration for service running in {{$labels.pod}} may be stale and cannot be updated anymore.'
          runbook_url: default_runbook_url
          summary: config-reloader sidecar has not had a successful reload for 10m
          dashboard_url: default_dashboard_url
      - alert: configreloadersidecarerrors-critical
        expr: max_over_time(reloader_last_reload_successful{namespace=~".+"}[5m]) == 0
        for: 15m
        labels:
          severity: critical
          group_name: configreloadersidecarerrors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'Errors encountered while the {{$labels.pod}} config-reloader sidecar attempts to sync config in {{$labels.namespace}} namespace.

            As a result, configuration for service running in {{$labels.pod}} may be stale and cannot be updated anymore.'
          runbook_url: default_runbook_url
          summary: config-reloader sidecar has not had a successful reload for 10m
          dashboard_url: default_dashboard_url
