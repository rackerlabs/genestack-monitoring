additionalPrometheusRulesMap:
  megaraid-pd-smart-info:
    groups:
    - name: megaraid-pd-smart-info
      rules:
      - alert: megaraid-pd-smart-info
        expr: megaraid_pd_smart_alerted{job="node-exporter"} > 0
        for: 15m
        labels:
          severity: info
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-pd-smart-info
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid physical disk SMARTD alert"
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nSlot: {{ $labels.slot }}\nNode: {{ $labels.k8s_node_name }}"
