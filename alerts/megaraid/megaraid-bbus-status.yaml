additionalPrometheusRulesMap:
  megaraid-bbus-status:
    groups:
    - name: megaraid-bbus-status
      rules:
      - alert: megaraid-bbus-status-warning
        expr: megaraid_battery_backup_healthy{job="node-exporter"} < 1
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.instance }}"
          group_name: megaraid-bbus-status
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid Battery Backup Unit (BBU) status alert"
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nlabels: {{ $labels }}"
      - alert: megaraid-bbus-status-critical
        expr: megaraid_battery_backup_healthy{job="node-exporter"} < 1
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.instance }}"
          group_name: megaraid-bbus-status
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid Battery Backup Unit (BBU) status alert"
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nlabels: {{ $labels }}"
