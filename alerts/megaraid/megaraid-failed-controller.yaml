additionalPrometheusRulesMap:
  megaraid-controller-disk-alerts:
    groups:
    - name: megaraid-controller-disk-alerts
      rules:
      - alert: megaraid-failed-controller-warning
        expr: megaraid_failed{job="node-exporter"} > 0
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.instance }}"
          group_name: megaraid-failed-controller
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL Megaraid controller has failed."
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nLABELS: {{ $labels }}"
      - alert: megaraid-failed-controller-critical
        expr: megaraid_failed{job="node-exporter"} > 0
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.instance }}"
          group_name: megaraid-failed-controller
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL Megaraid controller has failed."
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nLABELS: {{ $labels }}"
