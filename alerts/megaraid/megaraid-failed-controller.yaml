additionalPrometheusRulesMap:
  megaraid-controller-disk-alerts:
    groups:
    - name: megaraid-controller-disk-alerts
      rules:
      - alert: megaraid-failed-controller-warning
        expr: megaraid_failed{job="node-exporter"} > 0
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-failed-controller
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL Megaraid controller has failed."
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nNode: {{ $labels.k8s_node_name }}"
      - alert: megaraid-failed-controller-critical
        expr: megaraid_failed{job="node-exporter"} > 0
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-failed-controller
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL Megaraid controller has failed."
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nNode: {{ $labels.k8s_node_name }}"
