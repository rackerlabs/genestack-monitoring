additionalPrometheusRulesMap:
  megaraid-pd-alerts:
    groups:
    - name: megaraid-pd-alerts
      rules:
      - alert: megaraid-pd0s-warning
        expr: megaraid_pd_info{job="node-exporter", type!~"JBOD", state!~"Onln|UGood|DHS"}
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.instance }}"
          group_name: megaraid-pd0s
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid block storage data disk alert"
          description: "{{ $labels.name }}\nSlot: {{ $labels.slot }}\nSerial: {{ $labels.serial }}\nlabels: {{ $labels }}"
      - alert: megaraid-pd0s-critical
        expr: megaraid_pd_info{job="node-exporter", type!~"JBOD", state!~"Onln|UGood|DHS"}
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.instance }}"
          group_name: megaraid-pd0s
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid block storage data disk alert"
          description: "{{ $labels.name }}\nSlot: {{ $labels.slot }}\nSerial: {{ $labels.serial }}\nlabels: {{ $labels }}"
