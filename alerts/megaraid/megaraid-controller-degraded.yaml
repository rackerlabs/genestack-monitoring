additionalPrometheusRulesMap:
  megaraid-controller-degraded-alerts:
    groups:
    - name: megaraid-controller-degraded-alerts
      rules:
      - alert: megaraid-controller-degraded-warning
        expr: megaraid_degraded{job="node-exporter"} > 0
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-controller-degraded
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid controller is in degraded state."
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nNode: {{ $labels.k8s_node_name }}"
      - alert: megaraid-controller-degraded-critical
        expr: megaraid_degraded{job="node-exporter"} > 0
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-controller-degraded
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid controller is in degraded state."
          description: "{{ $labels.name }}\nController: {{ $labels.controller }}\nNode: {{ $labels.k8s_node_name }}"
