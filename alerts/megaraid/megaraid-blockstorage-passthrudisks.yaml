additionalPrometheusRulesMap:
  megaraid-blockstorage-passthrudisks:
    groups:
    - name: megaraid-blockstorage-passthrudisks
      rules:
      - alert: megaraid-blockstorage-passthrudisks-warning
        expr: megaraid_pd_info{job="node-exporter", DG="-", media="SSD", type="JBOD", state!~"Onln|UGood|DHS"}
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-blockstorage-passthrudisks
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid block storage data disk alert"
          description: "{{ $labels.name }}\nSlot: {{ $labels.slot }}\nSerial: {{ $labels.serial }}\nNode: {{ $labels.k8s_node_name }}"
      - alert: megaraid-blockstorage-passthrudisks-critical
        expr: megaraid_pd_info{job="node-exporter", DG="-", media="SSD", type="JBOD", state!~"Onln|UGood|DHS"}
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.k8s_node_name }}"
          group_name: megaraid-blockstorage-passthrudisks
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid block storage data disk alert"
          description: "{{ $labels.name }}\nSlot: {{ $labels.slot }}\nSerial: {{ $labels.serial }}\nNode: {{ $labels.k8s_node_name }}"
