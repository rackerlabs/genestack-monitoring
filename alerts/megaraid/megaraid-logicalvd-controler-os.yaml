additionalPrometheusRulesMap:
  megaraid-logicalvd-controller-os-alerts:
    groups:
    - name: megaraid-logicalvd-controller-os-alerts
      rules:
      - alert: megaraid-logical-vd-os-warning
        expr: megaraid_vd_info{job="node-exporter", type="RAID1", state!~"Optl"}
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.instance }}"
          group_name: megaraid-logical-vd-os
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid virtual disk (Operating System RAID1) alert"
          description: "{{ $labels.name }}\nSlot: {{ $labels.slot }}\nlabels: {{ $labels }}"
      - alert: megaraid-logical-vd-os-critical
        expr: megaraid_vd_info{job="node-exporter", type="RAID1", state!~"Optl"}
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.instance }}"
          group_name: megaraid-logical-vd-os
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "DELL megaraid virtual disk (Operating System RAID1) alert"
          description: "{{ $labels.name }}\nSlot: {{ $labels.slot }}\nlabels: {{ $labels }}"
