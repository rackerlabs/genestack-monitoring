additionalPrometheusRulesMap:
  kube-pod-not-ready:
    groups:
      - name: kube-pod-not-ready
        rules:
          - alert: kube-pod-not-ready-warning
            expr: >
              sum by (namespace, pod, node) (
                max by (namespace, pod, uid) (
                  kube_pod_status_phase{namespace=~".*", phase=~"Pending|Failed|Unknown"} == 1
                )
                * on (namespace, pod, uid)
                max by (namespace, pod, uid) (
                  kube_pod_owner{owner_kind!="Job", owner_is_controller="true"}
                )
                * on (namespace, pod, uid) group_left(node)
                max by (namespace, pod, uid, node) (
                  kube_pod_info{node!=""}
                )
              ) > 0
            for: 5m
            labels:
              severity: warning
              group_name: kube-pod-not-ready
              node_hostname: '{{ $labels.k8s_node_name }}'
              affected_node: '{{ $labels.k8s_node_name }}'
              correlation_key: node/{{ $labels.k8s_node_name }}
              correlation_scope: node
            annotations:
              description: >-
                Pod {{ $labels.exported_namespace }}/{{ $labels.exported_pod }} has been in a non-ready state for longer than 5
                minutes.
              runbook_url: default_runbook_url
              summary: Pod has been in a non-ready state for more than 5 minutes.
              dashboard_url: default_dashboard_url
          - alert: kube-pod-not-ready-critical
            expr: >
              sum by (namespace, pod, node) (
                max by (namespace, pod, uid) (
                  kube_pod_status_phase{namespace=~".*", phase=~"Pending|Failed|Unknown"} == 1
                )
                * on (namespace, pod, uid)
                max by (namespace, pod, uid) (
                  kube_pod_owner{owner_kind!="Job", owner_is_controller="true"}
                )
                * on (namespace, pod, uid) group_left(node)
                max by (namespace, pod, uid, node) (
                  kube_pod_info{node!=""}
                )
              ) > 0
            for: 10m
            labels:
              severity: critical
              group_name: kube-pod-not-ready
              node_hostname: '{{ $labels.k8s_node_name }}'
              affected_node: '{{ $labels.k8s_node_name }}'
              correlation_key: node/{{ $labels.k8s_node_name }}
              correlation_scope: node
            annotations:
              description: >-
                Pod {{ $labels.exported_namespace }}/{{ $labels.exported_pod }} has been in a non-ready state for longer than 10
                minutes.
              runbook_url: default_runbook_url
              summary: Pod has been in a non-ready state for more than 10 minutes.
              dashboard_url: default_dashboard_url
