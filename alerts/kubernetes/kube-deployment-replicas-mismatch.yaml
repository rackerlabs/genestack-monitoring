additionalPrometheusRulesMap:
  kube-deployment-replicas-mismatch:
    groups:
      - name: kube-deployment-replicas-mismatch
        rules:
          - alert: kube-deployment-replicas-mismatch-warning
            expr: >-
              ( k8s.deployment.desired{job="otelcol-k8scluster", namespace=~".*"} > k8s.deployment.available{job="otelcol-k8scluster", namespace=~".*"} )

              and ( changes(k8s.deployment.available{job="otelcol-k8scluster", namespace=~".*"}[10m]) == 0 )
            for: 5m
            labels:
              severity: warning
              group_name: kube-deployment-replicas-mismatch
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not matched the expected number of replicas for longer than 5 minutes on cluster {{ $labels.cluster }}.
              runbook_url: default_runbook_url
              summary: Deployment has not matched the expected number of replicas.
              dashboard_url: default_dashboard_url
          - alert: kube-deployment-replicas-mismatch-critical
            expr: >-
              ( k8s.deployment.desired{job="otelcol-k8scluster", namespace=~".*"} > k8s.deployment.available{job="otelcol-k8scluster", namespace=~".*"} )

              and ( changes(k8s.deployment.available{job="otelcol-k8scluster", namespace=~".*"}[10m]) == 0 )
            for: 15m
            labels:
              severity: critical
              group_name: kube-deployment-replicas-mismatch
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has not matched the expected number of replicas for longer than 15 minutes on cluster {{ $labels.cluster }}.
              runbook_url: default_runbook_url
              summary: Deployment has not matched the expected number of replicas.
              dashboard_url: default_dashboard_url
