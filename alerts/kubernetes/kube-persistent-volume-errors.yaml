additionalPrometheusRulesMap:
  kube-persistent-volume-errors:
    groups:
      - name: kube-persistent-volume-errors
        rules:
          # NOTE: PersistentVolume metrics may not be available in OTel k8sclusterreceiver
          # Consider using Prometheus receiver for kube-state-metrics
          - alert: kube-persistent-volume-errors-warning
            expr: kube_persistentvolume_status_phase{phase=~"Failed|Pending",job="kube-state-metrics"} > 0
            for: 5m
            labels:
              severity: warning
              group_name: kube-persistent-volume-errors
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: The persistent volume {{ $labels.persistentvolume }} {{ with $labels.cluster -}} on Cluster {{ . }} {{- end }} has status {{ $labels.phase }}.
              runbook_url: default_runbook_url
              summary: PersistentVolume is having issues with provisioning.
              dashboard_url: default_dashboard_url
          # NOTE: PersistentVolume metrics may not be available in OTel k8sclusterreceiver
          # Consider using Prometheus receiver for kube-state-metrics
          - alert: kube-persistent-volume-errors-critical
            expr: kube_persistentvolume_status_phase{phase=~"Failed|Pending",job="kube-state-metrics"} > 0
            for: 15m
            labels:
              severity: critical
              group_name: kube-persistent-volume-errors
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: The persistent volume {{ $labels.persistentvolume }} {{ with $labels.cluster -}} on Cluster {{ . }} {{- end }} has status {{ $labels.phase }}.
              runbook_url: default_runbook_url
              summary: PersistentVolume is having issues with provisioning.
              dashboard_url: default_dashboard_url
