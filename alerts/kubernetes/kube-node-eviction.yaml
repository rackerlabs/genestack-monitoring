additionalPrometheusRulesMap:
  kube-node-eviction:
    groups:
      - name: kube-node-eviction
        rules:
          - alert: kube-node-eviction-warning
            expr: >-
              sum(rate(kubelet_evictions{job="kubelet", metrics_path="/metrics"}[15m])) by (cluster, eviction_signal, instance) * on (cluster, instance) group_left(node) max by (cluster, instance, node) ( kubelet_node_name{job="kubelet", metrics_path="/metrics"} ) > 0
            for: 5m
            labels:
              severity: warning
              group_name: kube-node-eviction
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Node {{ $labels.node }} on {{ $labels.cluster }} is evicting Pods due to {{ $labels.eviction_signal }}.  Eviction occurs when eviction thresholds are crossed, typically caused by Pods exceeding RAM/ephemeral-storage limits.
              runbook_url: default_runbook_url
              summary: Node is evicting pods.
              dashboard_url: default_dashboard_url
          - alert: kube-node-eviction-critical
            expr: >-
              sum(rate(kubelet_evictions{job="kubelet", metrics_path="/metrics"}[15m])) by (cluster, eviction_signal, instance) * on (cluster, instance) group_left(node) max by (cluster, instance, node) ( kubelet_node_name{job="kubelet", metrics_path="/metrics"} ) > 0
            for: 15m
            labels:
              severity: critical
              group_name: kube-node-eviction
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Node {{ $labels.node }} on {{ $labels.cluster }} is evicting Pods due to {{ $labels.eviction_signal }}.  Eviction occurs when eviction thresholds are crossed, typically caused by Pods exceeding RAM/ephemeral-storage limits.
              runbook_url: default_runbook_url
              summary: Node is evicting pods.
              dashboard_url: default_dashboard_url
