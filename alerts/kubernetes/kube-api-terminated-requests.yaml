additionalPrometheusRulesMap:
  kube-api-terminated-requests:
    groups:
      - name: kube-api-terminated-requests
        rules:
          - alert: kube-api-terminated-requests-warning
            expr: >-
              sum by (cluster) (rate(apiserver_request_terminations_total{job="apiserver"}[10m])) / ( sum by (cluster) (rate(apiserver_request_total{job="apiserver"}[10m])) + sum by (cluster) (rate(apiserver_request_terminations_total{job="apiserver"}[10m])) ) > 0.20
            for: 5m
            labels:
              severity: warning
              group_name: kube-api-terminated-requests
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: The kubernetes apiserver has terminated {{ $value | humanizePercentage }} of its incoming requests on cluster {{ $labels.cluster }}.
              runbook_url: default_runbook_url
              summary: The kubernetes apiserver has terminated {{ $value | humanizePercentage }} of its incoming requests.
              dashboard_url: default_dashboard_url
          - alert: kube-api-terminated-requests-critical
            expr: >-
              sum by (cluster) (rate(apiserver_request_terminations_total{job="apiserver"}[10m])) / ( sum by (cluster) (rate(apiserver_request_total{job="apiserver"}[10m])) + sum by (cluster) (rate(apiserver_request_terminations_total{job="apiserver"}[10m])) ) > 0.20
            for: 15m
            labels:
              severity: critical
              group_name: kube-api-terminated-requests
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: The kubernetes apiserver has terminated {{ $value | humanizePercentage }} of its incoming requests on cluster {{ $labels.cluster }}.
              runbook_url: default_runbook_url
              summary: The kubernetes apiserver has terminated {{ $value | humanizePercentage }} of its incoming requests.
              dashboard_url: default_dashboard_url
