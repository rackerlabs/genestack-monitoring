additionalPrometheusRulesMap:
  kube-persistent-volume-filling-up:
    groups:
      - name: kube-persistent-volume-filling-up
        rules:
          # NOTE: kubelet_volume_stats metrics come from kubelet (kubeletstatsreceiver), keep job="kubelet"
          # kube_persistentvolumeclaim metrics from kube-state-metrics may not be in OTel - consider Prometheus receiver
          - alert: kube-persistent-volume-filling-up-warning
            expr: >-
              ( kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} / kubelet_volume_stats_capacity_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} ) < 0.15

              and kubelet_volume_stats_used_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} > 0

              and predict_linear(kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}[6h], 4 * 24 * 3600) < 0 unless on (cluster, namespace, persistentvolumeclaim) kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1 unless on (cluster, namespace, persistentvolumeclaim) kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 5m
            labels:
              severity: warning
              group_name: kube-persistent-volume-filling-up
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Based on recent sampling, the PersistentVolume claimed by {{ $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }} {{ with $labels.cluster -}} on Cluster {{ . }} {{- end }} is expected to fill up within four days. Currently {{ $value | humanizePercentage }} is available.
              runbook_url: default_runbook_url
              summary: PersistentVolume is filling up.
              dashboard_url: default_dashboard_url
          # NOTE: kubelet_volume_stats metrics come from kubelet (kubeletstatsreceiver), keep job="kubelet"
          # kube_persistentvolumeclaim metrics from kube-state-metrics may not be in OTel - consider Prometheus receiver
          - alert: kube-persistent-volume-filling-up-critical
            expr: >-
              ( kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} / kubelet_volume_stats_capacity_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} ) < 0.15

              and kubelet_volume_stats_used_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"} > 0

              and predict_linear(kubelet_volume_stats_available_bytes{job="kubelet", namespace=~".*", metrics_path="/metrics"}[6h], 4 * 24 * 3600) < 0 unless on (cluster, namespace, persistentvolumeclaim) kube_persistentvolumeclaim_access_mode{ access_mode="ReadOnlyMany"} == 1 unless on (cluster, namespace, persistentvolumeclaim) kube_persistentvolumeclaim_labels{label_excluded_from_alerts="true"} == 1
            for: 15m
            labels:
              severity: critical
              group_name: kube-persistent-volume-filling-up
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Based on recent sampling, the PersistentVolume claimed by {{ $labels.persistentvolumeclaim }} in Namespace {{ $labels.namespace }} {{ with $labels.cluster -}} on Cluster {{ . }} {{- end }} is expected to fill up within four days. Currently {{ $value | humanizePercentage }} is available.
              runbook_url: default_runbook_url
              summary: PersistentVolume is filling up.
              dashboard_url: default_dashboard_url
