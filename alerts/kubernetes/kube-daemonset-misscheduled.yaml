additionalPrometheusRulesMap:
  kube-daemonset-misscheduled:
    groups:
      - name: kube-daemonset-misscheduled
        rules:
          - alert: kube-daemonset-misscheduled-warning
            expr: kube_daemonset_status_number_misscheduled{namespace=~".*"} > 0
            for: 5m
            labels:
              severity: warning
              group_name: kube-daemonset-misscheduled
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
              correlation_key: daemonset/{{ $labels.namespace }}/{{ $labels.daemonset }}
              correlation_scope: daemonset
            annotations:
              description: >-
                {{ $value }} Pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are running where
                they are not supposed to run on cluster {{ $labels.cluster }}. This warning alert fires after
                5m.
              runbook_url: default_runbook_url
              summary: DaemonSet pods are misscheduled.
              dashboard_url: default_dashboard_url
          - alert: kube-daemonset-misscheduled-critical
            expr: kube_daemonset_status_number_misscheduled{namespace=~".*"} > 0
            for: 10m
            labels:
              severity: critical
              group_name: kube-daemonset-misscheduled
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
              correlation_key: daemonset/{{ $labels.namespace }}/{{ $labels.daemonset }}
              correlation_scope: daemonset
            annotations:
              description: >-
                {{ $value }} Pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are running where
                they are not supposed to run on cluster {{ $labels.cluster }}. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: DaemonSet pods are misscheduled.
              dashboard_url: default_dashboard_url
