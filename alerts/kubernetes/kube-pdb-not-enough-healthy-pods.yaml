additionalPrometheusRulesMap:
  kube-pdb-not-enough-healthy-pods:
    groups:
      - name: kube-pdb-not-enough-healthy-pods
        rules:
          # NOTE: PodDisruptionBudget metrics may not be available in OTel k8sclusterreceiver
          # Consider using Prometheus receiver for kube-state-metrics
          - alert: kube-pdb-not-enough-healthy-pods-warning
            expr: >-
              ( kube_poddisruptionbudget_status_desired_healthy{job="kube-state-metrics", namespace=~".*"} - kube_poddisruptionbudget_status_current_healthy{job="kube-state-metrics", namespace=~".*"} ) > 0
            for: 5m
            labels:
              severity: warning
              group_name: kube-pdb-not-enough-healthy-pods
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: PDB {{ $labels.cluster }}/{{ $labels.namespace }}/{{ $labels.poddisruptionbudget }} expects {{ $value }} more healthy pods. The desired number of healthy pods has not been met for at least 5 minutes.
              runbook_url: default_runbook_url
              summary: PDB does not have enough healthy pods.
              dashboard_url: default_dashboard_url
          # NOTE: PodDisruptionBudget metrics may not be available in OTel k8sclusterreceiver
          # Consider using Prometheus receiver for kube-state-metrics
          - alert: kube-pdb-not-enough-healthy-pods-critical
            expr: >-
              ( kube_poddisruptionbudget_status_desired_healthy{job="kube-state-metrics", namespace=~".*"} - kube_poddisruptionbudget_status_current_healthy{job="kube-state-metrics", namespace=~".*"} ) > 0
            for: 15m
            labels:
              severity: critical
              group_name: kube-pdb-not-enough-healthy-pods
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: PDB {{ $labels.cluster }}/{{ $labels.namespace }}/{{ $labels.poddisruptionbudget }} expects {{ $value }} more healthy pods. The desired number of healthy pods has not been met for at least 15 minutes.
              runbook_url: default_runbook_url
              summary: PDB does not have enough healthy pods.
              dashboard_url: default_dashboard_url
