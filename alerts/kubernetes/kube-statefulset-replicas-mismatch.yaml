additionalPrometheusRulesMap:
  kube-statefulset-replicas-mismatch:
    groups:
      - name: kube-statefulset-replicas-mismatch
        rules:
          - alert: kube-statefulset-replicas-mismatch-warning
            expr: >-
              ( k8s.statefulset.ready_pods{job="otelcol-k8scluster", namespace=~".*"} != k8s.statefulset.desired_pods{job="otelcol-k8scluster", namespace=~".*"} )

              and ( changes(k8s.statefulset.updated_pods{job="otelcol-k8scluster", namespace=~".*"}[10m]) == 0 )
            for: 5m
            labels:
              severity: warning
              group_name: kube-statefulset-replicas-mismatch
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected number of replicas for longer than 5 minutes on cluster {{ $labels.cluster }}.
              runbook_url: default_runbook_url
              summary: StatefulSet has not matched the expected number of replicas.
              dashboard_url: default_dashboard_url
          - alert: kube-statefulset-replicas-mismatch-critical
            expr: >-
              ( k8s.statefulset.ready_pods{job="otelcol-k8scluster", namespace=~".*"} != k8s.statefulset.desired_pods{job="otelcol-k8scluster", namespace=~".*"} )

              and ( changes(k8s.statefulset.updated_pods{job="otelcol-k8scluster", namespace=~".*"}[10m]) == 0 )
            for: 15m
            labels:
              severity: critical
              group_name: kube-statefulset-replicas-mismatch
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has not matched the expected number of replicas for longer than 15 minutes on cluster {{ $labels.cluster }}.
              runbook_url: default_runbook_url
              summary: StatefulSet has not matched the expected number of replicas.
              dashboard_url: default_dashboard_url
