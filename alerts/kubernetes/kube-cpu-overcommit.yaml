additionalPrometheusRulesMap:
  kube-cpu-overcommit:
    groups:
      - name: kube-cpu-overcommit
        rules:
          # NOTE: kube_node_status_allocatable and kube_node_role may not be available in OTel k8sclusterreceiver
          # Consider using Prometheus receiver for kube-state-metrics or recording rules
          - alert: kube-cpu-overcommit-warning
            expr: >-
              # Non-HA clusters. ( ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) > 0 )

              and count by (cluster) (max by (cluster, node) (kube_node_role{job="kube-state-metrics", role="control-plane"})) < 3 )

              or # HA clusters. ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - ( # Skip clusters with only one allocatable node. ( sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) - max by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) ) > 0 ) > 0 )
            for: 5m
            labels:
              severity: warning
              group_name: kube-cpu-overcommit
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Cluster {{ $labels.cluster }} has overcommitted CPU resource requests for Pods by {{ printf "%.2f" $value }} CPU shares and cannot tolerate node failure.
              runbook_url: default_runbook_url
              summary: Cluster has overcommitted CPU resource requests.
              dashboard_url: default_dashboard_url
          # NOTE: kube_node_status_allocatable and kube_node_role may not be available in OTel k8sclusterreceiver
          # Consider using Prometheus receiver for kube-state-metrics or recording rules
          - alert: kube-cpu-overcommit-critical
            expr: >-
              # Non-HA clusters. ( ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) > 0 )

              and count by (cluster) (max by (cluster, node) (kube_node_role{job="kube-state-metrics", role="control-plane"})) < 3 )

              or # HA clusters. ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - ( # Skip clusters with only one allocatable node. ( sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) - max by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) ) > 0 ) > 0 )
            for: 15m
            labels:
              severity: critical
              group_name: kube-cpu-overcommit
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Cluster {{ $labels.cluster }} has overcommitted CPU resource requests for Pods by {{ printf "%.2f" $value }} CPU shares and cannot tolerate node failure.
              runbook_url: default_runbook_url
              summary: Cluster has overcommitted CPU resource requests.
              dashboard_url: default_dashboard_url
