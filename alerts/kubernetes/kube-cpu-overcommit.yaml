additionalPrometheusRulesMap:
  kube-cpu-overcommit:
    groups:
      - name: kube-cpu-overcommit
        rules:
          - alert: kube-cpu-overcommit-warning
            expr: >-
              ( ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) > 0 )

              and count by (cluster) (max by (cluster, node) (kube_node_role{job="kube-state-metrics", role="control-plane"})) < 3 )

              or ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - (( sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) - max by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) ) > 0 ) > 0 )
            for: 5m
            labels:
              severity: warning
              group_name: kube-cpu-overcommit
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                Cluster {{ $labels.cluster }} has overcommitted CPU resource requests for Pods by {{ printf
                "%.2f" $value }} CPU shares and cannot tolerate node failure. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Cluster has overcommitted CPU resource requests.
              dashboard_url: default_dashboard_url
          - alert: kube-cpu-overcommit-critical
            expr: >-
              ( ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) > 0 )

              and count by (cluster) (max by (cluster, node) (kube_node_role{job="kube-state-metrics", role="control-plane"})) < 3 )

              or ( sum by (cluster) (namespace_cpu:kube_pod_container_resource_requests:sum{}) - (( sum by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) - max by (cluster) (kube_node_status_allocatable{job="kube-state-metrics",resource="cpu"}) ) > 0 ) > 0 )
            for: 10m
            labels:
              severity: critical
              group_name: kube-cpu-overcommit
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: >-
                Cluster {{ $labels.cluster }} has overcommitted CPU resource requests for Pods by {{ printf
                "%.2f" $value }} CPU shares and cannot tolerate node failure. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Cluster has overcommitted CPU resource requests.
              dashboard_url: default_dashboard_url
