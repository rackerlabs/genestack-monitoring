additionalPrometheusRulesMap:
  openstack-rabbitmq-neutron-queue-too-large:
    groups:
    - name: openstack-rabbitmq-neutron-queue-too-large
      rules:
      - alert: openstack-rabbitmq-neutron-queue-too-large-warning
        expr: rabbitmq_queue_messages{vhost="neutron"} > 25
        for: 10m
        labels:
          severity: warning
          group_name: openstack-rabbitmq-neutron-queue-too-large
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Neutron vhost in RabbitMQ has too many messages. Check consumers.
          runbook_url: default_runbook_url
          summary: Neutron vhost has too many messages
          dashboard_url: default_dashboard_url
      - alert: openstack-rabbitmq-neutron-queue-too-large-critical
        expr: rabbitmq_queue_messages{vhost="neutron"} > 25
        for: 15m
        labels:
          severity: critical
          group_name: openstack-rabbitmq-neutron-queue-too-large
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: Neutron vhost in RabbitMQ has too many messages. Check consumers.
          runbook_url: default_runbook_url
          summary: Neutron vhost has too many messages
          dashboard_url: default_dashboard_url
