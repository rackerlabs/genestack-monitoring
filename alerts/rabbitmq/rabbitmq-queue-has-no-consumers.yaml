additionalPrometheusRulesMap:
  rabbitmq-queue-has-no-consumers:
    groups:
    - name: rabbitmq-queue-has-no-consumers
      rules:
      - alert: rabbitmq-queue-has-no-consumers-warning
        expr: (((rabbitmq_detailed_queue_consumers{vhost="/", queue=~".*"} == 0) + rabbitmq_detailed_queue_messages) > 0) * on (instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)
        for: 10m
        labels:
          severity: warning
          group_name: rabbitmq-queue-has-no-consumers
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Over the last 10 minutes, non-empty queue `{{ $labels.queue }}` with {{ $value }} messages in
            virtual host `{{ $labels.vhost }}` didn't have any consumers in RabbitMQ cluster `{{
            $labels.rabbitmq_cluster }}` in namespace `{{ $labels.namespace }}`. This warning alert fires
            after 10m.
          runbook_url: default_runbook_url
          summary: 'Messages are sitting idle in the queue, without any processing.

            This alert is highly application specific (and e.g. doesn''t make sense for stream queues).

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-queue-has-no-consumers-critical
        expr: (((rabbitmq_detailed_queue_consumers{vhost="/", queue=~".*"} == 0) + rabbitmq_detailed_queue_messages) > 0) * on (instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)
        for: 10m
        labels:
          severity: critical
          group_name: rabbitmq-queue-has-no-consumers
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Over the last 10 minutes, non-empty queue `{{ $labels.queue }}` with {{ $value }} messages in
            virtual host `{{ $labels.vhost }}` didn't have any consumers in RabbitMQ cluster `{{
            $labels.rabbitmq_cluster }}` in namespace `{{ $labels.namespace }}`. This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: 'Messages are sitting idle in the queue, without any processing.

            This alert is highly application specific (and e.g. doesn''t make sense for stream queues).

            '
          dashboard_url: default_dashboard_url
