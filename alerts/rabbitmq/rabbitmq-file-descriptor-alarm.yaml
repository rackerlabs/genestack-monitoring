additionalPrometheusRulesMap:
  rabbitmq-file-descriptor-alarm:
    groups:
    - name: rabbitmq-file-descriptor-alarm
      rules:
      - alert: rabbitmq-file-descriptor-alarm-warning
        expr: max by(rabbitmq_cluster) (max_over_time(rabbitmq_alarms_file_descriptor_limit[5m])  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) > 0
        for: 0m
        labels:
          severity: warning
          group_name: rabbitmq-file-descriptor-alarm
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` file descriptor alarm active. Publishers are
            blocked. This warning alert fires immediately.
          runbook_url: default_runbook_url
          summary: 'A RabbitMQ node ran out of file descriptors.

            See https://www.rabbitmq.com/docs/alarms#file-descriptors.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-file-descriptor-alarm-critical
        expr: max by(rabbitmq_cluster) (max_over_time(rabbitmq_alarms_file_descriptor_limit[5m])  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) > 0
        for: 5m
        labels:
          severity: critical
          group_name: rabbitmq-file-descriptor-alarm
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` file descriptor alarm active. Publishers are
            blocked. This critical alert fires after 5m.
          runbook_url: default_runbook_url
          summary: 'A RabbitMQ node ran out of file descriptors.

            See https://www.rabbitmq.com/docs/alarms#file-descriptors.

            '
          dashboard_url: default_dashboard_url
