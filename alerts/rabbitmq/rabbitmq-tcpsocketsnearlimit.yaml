additionalPrometheusRulesMap:
  rabbitmq-tcpsocketsnearlimit:
    groups:
    - name: rabbitmq-tcpsocketsnearlimit
      rules:
      - alert: rabbitmq-tcpsocketsnearlimit-warning
        expr: 'sum by(namespace, rabbitmq_cluster, pod, rabbitmq_node) (max_over_time(rabbitmq_process_open_tcp_sockets[5m]) * on(instance) group_left(rabbitmq_cluster, rabbitmq_node, pod) rabbitmq_identity_info)

          /

          sum by(namespace, rabbitmq_cluster, pod, rabbitmq_node) (rabbitmq_process_max_tcp_sockets  * on(instance) group_left(rabbitmq_cluster, rabbitmq_node, pod) rabbitmq_identity_info)

          > 0.8

          '
        for: 10m
        labels:
          severity: warning
          group_name: rabbitmq-tcpsocketsnearlimit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '`{{ $value | humanizePercentage }}` TCP sockets of TCP socket

            limit are open in RabbitMQ node `{{ $labels.rabbitmq_node }}`, pod `{{ $labels.pod }}`,

            RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}`, namespace `{{ $labels.namespace }}`.

            '
          runbook_url: default_runbook_url
          summary: 'More than 80% of TCP sockets are open on the RabbitMQ node.

            When this value reaches 100%, new connections will not be accepted.

            Client libraries, peer nodes and CLI tools will not be able to connect when the node runs out of available TCP sockets.

            See https://www.rabbitmq.com/networking.html.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-tcpsocketsnearlimit-critical
        expr: 'sum by(namespace, rabbitmq_cluster, pod, rabbitmq_node) (max_over_time(rabbitmq_process_open_tcp_sockets[5m]) * on(instance) group_left(rabbitmq_cluster, rabbitmq_node, pod) rabbitmq_identity_info)

          /

          sum by(namespace, rabbitmq_cluster, pod, rabbitmq_node) (rabbitmq_process_max_tcp_sockets  * on(instance) group_left(rabbitmq_cluster, rabbitmq_node, pod) rabbitmq_identity_info)

          > 0.8

          '
        for: 15m
        labels:
          severity: critical
          group_name: rabbitmq-tcpsocketsnearlimit
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: '`{{ $value | humanizePercentage }}` TCP sockets of TCP socket

            limit are open in RabbitMQ node `{{ $labels.rabbitmq_node }}`, pod `{{ $labels.pod }}`,

            RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}`, namespace `{{ $labels.namespace }}`.

            '
          runbook_url: default_runbook_url
          summary: 'More than 80% of TCP sockets are open on the RabbitMQ node.

            When this value reaches 100%, new connections will not be accepted.

            Client libraries, peer nodes and CLI tools will not be able to connect when the node runs out of available TCP sockets.

            See https://www.rabbitmq.com/networking.html.

            '
          dashboard_url: default_dashboard_url
