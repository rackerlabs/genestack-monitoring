additionalPrometheusRulesMap:
  rabbitmq-persistent-volume-missing:
    groups:
    - name: rabbitmq-persistent-volume-missing
      rules:
      - alert: rabbitmq-persistent-volume-missing-warning
        expr: 'kube_persistentvolumeclaim_status_phase{phase="Bound"} * on (namespace, persistentvolumeclaim) group_left(label_app_kubernetes_io_name) kube_persistentvolumeclaim_labels{label_app_kubernetes_io_component="rabbitmq"} == 0'
        for: 10m
        labels:
          severity: warning
          group_name: rabbitmq-persistent-volume-missing
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
          rabbitmq_cluster: '{{ $labels.label_app_kubernetes_io_name }}'
        annotations:
          description: >-
            PersistentVolumeClaim `{{ $labels.persistentvolumeclaim }}` of RabbitMQ cluster `{{
            $labels.label_app_kubernetes_io_name }}` in namespace `{{ $labels.namespace }}` is not bound.
            This warning alert fires after 10m.
          runbook_url: default_runbook_url
          summary: 'RabbitMQ needs a PersistentVolume for its data.

            However, there is no PersistentVolume bound to the PersistentVolumeClaim.

            This means the requested storage could not be provisioned.

            Check the status of the PersistentVolumeClaim: `kubectl -n {{ $labels.namespace }} describe pvc {{ $labels.persistentvolumeclaim }}`.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-persistent-volume-missing-critical
        expr: 'kube_persistentvolumeclaim_status_phase{phase="Bound"} * on (namespace, persistentvolumeclaim) group_left(label_app_kubernetes_io_name) kube_persistentvolumeclaim_labels{label_app_kubernetes_io_component="rabbitmq"} == 0'
        for: 10m
        labels:
          severity: critical
          group_name: rabbitmq-persistent-volume-missing
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
          rabbitmq_cluster: '{{ $labels.label_app_kubernetes_io_name }}'
        annotations:
          description: >-
            PersistentVolumeClaim `{{ $labels.persistentvolumeclaim }}` of RabbitMQ cluster `{{
            $labels.label_app_kubernetes_io_name }}` in namespace `{{ $labels.namespace }}` is not bound.
            This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: 'RabbitMQ needs a PersistentVolume for its data.

            However, there is no PersistentVolume bound to the PersistentVolumeClaim.

            This means the requested storage could not be provisioned.

            Check the status of the PersistentVolumeClaim: `kubectl -n {{ $labels.namespace }} describe pvc {{ $labels.persistentvolumeclaim }}`.

            '
          dashboard_url: default_dashboard_url
