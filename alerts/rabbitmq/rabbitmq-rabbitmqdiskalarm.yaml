additionalPrometheusRulesMap:
  rabbitmq-rabbitmqdiskalarm:
    groups:
    - name: rabbitmq-rabbitmqdiskalarm
      rules:
      - alert: rabbitmq-rabbitmqdiskalarm-warning
        expr: "max by(rabbitmq_cluster) (\n  max_over_time(rabbitmq_alarms_free_disk_space_watermark[5m])\n  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)\n) > 0\n"
        for: 0m
        labels:
          severity: warning
          group_name: rabbitmq-rabbitmqdiskalarm
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` disk alarm active. Publishers are blocked.

            '
          runbook_url: default_runbook_url
          summary: 'A RabbitMQ node reached the `disk_free_limit` threshold.

            See https://www.rabbitmq.com/docs/alarms#overview, https://www.rabbitmq.com/docs/disk-alarms.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-rabbitmqdiskalarm-critical
        expr: "max by(rabbitmq_cluster) (\n  max_over_time(rabbitmq_alarms_free_disk_space_watermark[5m])\n  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)\n) > 0\n"
        for: 5m
        labels:
          severity: critical
          group_name: rabbitmq-rabbitmqdiskalarm
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` disk alarm active. Publishers are blocked.

            '
          runbook_url: default_runbook_url
          summary: 'A RabbitMQ node reached the `disk_free_limit` threshold.

            See https://www.rabbitmq.com/docs/alarms#overview, https://www.rabbitmq.com/docs/disk-alarms.

            '
          dashboard_url: default_dashboard_url
