additionalPrometheusRulesMap:
  rabbitmq-high-connection-churn:
    groups:
    - name: rabbitmq-high-connection-churn
      rules:
      - alert: rabbitmq-high-connection-churn-warning
        expr: (sum by (namespace, rabbitmq_cluster) (rate(rabbitmq_connections_closed_total[5m])  * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info) ) +  sum by (namespace, rabbitmq_cluster) ( rate(rabbitmq_connections_opened_total[5m])  * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info))) / sum by (namespace, rabbitmq_cluster) (rabbitmq_connections  * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) > 0.1 unless sum by (namespace, rabbitmq_cluster) (rabbitmq_connections * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) < 100
        for: 10m
        labels:
          severity: warning
          group_name: rabbitmq-high-connection-churn
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Over the last 5 minutes, `{{ $value | humanizePercentage }}` of total connections are closed or
            opened per second in RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` in namespace `{{
            $labels.namespace }}`. This warning alert fires after 10m.
          runbook_url: default_runbook_url
          summary: 'More than 10% of total connections are churning.

            This means that client application connections are short-lived instead of long-lived.

            Read https://www.rabbitmq.com/connections.html#high-connection-churn to understand why this is an anti-pattern.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-high-connection-churn-critical
        expr: (sum by (namespace, rabbitmq_cluster) (rate(rabbitmq_connections_closed_total[5m])  * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info) ) +  sum by (namespace, rabbitmq_cluster) ( rate(rabbitmq_connections_opened_total[5m])  * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info))) / sum by (namespace, rabbitmq_cluster) (rabbitmq_connections  * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) > 0.1 unless sum by (namespace, rabbitmq_cluster) (rabbitmq_connections * on (instance) group_left (rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) < 100
        for: 10m
        labels:
          severity: critical
          group_name: rabbitmq-high-connection-churn
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            Over the last 5 minutes, `{{ $value | humanizePercentage }}` of total connections are closed or
            opened per second in RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` in namespace `{{
            $labels.namespace }}`. This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: 'More than 10% of total connections are churning.

            This means that client application connections are short-lived instead of long-lived.

            Read https://www.rabbitmq.com/connections.html#high-connection-churn to understand why this is an anti-pattern.

            '
          dashboard_url: default_dashboard_url
