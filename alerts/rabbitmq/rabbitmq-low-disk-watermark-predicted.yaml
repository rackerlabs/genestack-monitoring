additionalPrometheusRulesMap:
  rabbitmq-low-disk-watermark-predicted:
    groups:
    - name: rabbitmq-low-disk-watermark-predicted
      rules:
      - alert: rabbitmq-low-disk-watermark-predicted-warning
        expr: (predict_linear(rabbitmq_disk_space_available_bytes[24h], 60*60*24) * on (instance) group_left(rabbitmq_cluster, rabbitmq_node) max by (instance, rabbitmq_node, rabbitmq_cluster) (rabbitmq_identity_info)  < rabbitmq_disk_space_available_limit_bytes * on (instance) group_left(rabbitmq_cluster, rabbitmq_node) max by (instance, rabbitmq_node, rabbitmq_cluster) (rabbitmq_identity_info)) and (count_over_time(rabbitmq_disk_space_available_limit_bytes[2h] offset 22h) * on (instance) group_left(rabbitmq_cluster, rabbitmq_node) max by (instance, rabbitmq_node, rabbitmq_cluster) (rabbitmq_identity_info) > 0)
        for: 60m
        labels:
          severity: warning
          group_name: rabbitmq-low-disk-watermark-predicted
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            The predicted free disk space in 24 hours from now is `{{ $value | humanize1024 }}B` in RabbitMQ
            node `{{ $labels.rabbitmq_node }}`, pod `{{ $labels.pod }}`, RabbitMQ cluster `{{
            $labels.rabbitmq_cluster }}`, namespace `{{ $labels.namespace }}`. This warning alert fires
            after 60m.
          runbook_url: default_runbook_url
          summary: 'Based on the trend of available disk space over the past 24 hours, it''s predicted that, in 24 hours from now, a disk alarm will be triggered since the free disk space will drop below the free disk space limit.

            This alert is reported for the partition where the RabbitMQ data directory is stored.

            When the disk alarm will be triggered, all publishing connections across all cluster nodes will be blocked.

            See

            https://www.rabbitmq.com/alarms.html,

            https://www.rabbitmq.com/disk-alarms.html,

            https://www.rabbitmq.com/production-checklist.html#resource-limits-disk-space,

            https://www.rabbitmq.com/persistence-conf.html,

            https://www.rabbitmq.com/connection-blocked.html.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-low-disk-watermark-predicted-critical
        expr: (predict_linear(rabbitmq_disk_space_available_bytes[24h], 60*60*24) * on (instance) group_left(rabbitmq_cluster, rabbitmq_node) max by (instance, rabbitmq_node, rabbitmq_cluster) (rabbitmq_identity_info)  < rabbitmq_disk_space_available_limit_bytes * on (instance) group_left(rabbitmq_cluster, rabbitmq_node) max by (instance, rabbitmq_node, rabbitmq_cluster) (rabbitmq_identity_info)) and (count_over_time(rabbitmq_disk_space_available_limit_bytes[2h] offset 22h) * on (instance) group_left(rabbitmq_cluster, rabbitmq_node) max by (instance, rabbitmq_node, rabbitmq_cluster) (rabbitmq_identity_info) > 0)
        for: 120m
        labels:
          severity: critical
          group_name: rabbitmq-low-disk-watermark-predicted
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            The predicted free disk space in 24 hours from now is `{{ $value | humanize1024 }}B` in RabbitMQ
            node `{{ $labels.rabbitmq_node }}`, pod `{{ $labels.pod }}`, RabbitMQ cluster `{{
            $labels.rabbitmq_cluster }}`, namespace `{{ $labels.namespace }}`. This critical alert fires
            after 120m.
          runbook_url: default_runbook_url
          summary: 'Based on the trend of available disk space over the past 24 hours, it''s predicted that, in 24 hours from now, a disk alarm will be triggered since the free disk space will drop below the free disk space limit.

            This alert is reported for the partition where the RabbitMQ data directory is stored.

            When the disk alarm will be triggered, all publishing connections across all cluster nodes will be blocked.

            See

            https://www.rabbitmq.com/alarms.html,

            https://www.rabbitmq.com/disk-alarms.html,

            https://www.rabbitmq.com/production-checklist.html#resource-limits-disk-space,

            https://www.rabbitmq.com/persistence-conf.html,

            https://www.rabbitmq.com/connection-blocked.html.

            '
          dashboard_url: default_dashboard_url
