additionalPrometheusRulesMap:
  rabbitmq-disk-alarm:
    groups:
    - name: rabbitmq-disk-alarm
      rules:
      - alert: rabbitmq-disk-alarm-warning
        expr: max by(rabbitmq_cluster) (max_over_time(rabbitmq_alarms_free_disk_space_watermark[5m])  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) > 0
        for: 0m
        labels:
          severity: warning
          group_name: rabbitmq-disk-alarm
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` disk alarm active. Publishers are blocked.
            This warning alert fires immediately.
          runbook_url: default_runbook_url
          summary: 'A RabbitMQ node reached the `disk_free_limit` threshold.

            See https://www.rabbitmq.com/docs/alarms#overview, https://www.rabbitmq.com/docs/disk-alarms.

            '
          dashboard_url: default_dashboard_url
      - alert: rabbitmq-disk-alarm-critical
        expr: max by(rabbitmq_cluster) (max_over_time(rabbitmq_alarms_free_disk_space_watermark[5m])  * on(instance) group_left(rabbitmq_cluster) max by (instance, rabbitmq_cluster) (rabbitmq_identity_info)) > 0
        for: 5m
        labels:
          severity: critical
          group_name: rabbitmq-disk-alarm
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: >-
            RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}` disk alarm active. Publishers are blocked.
            This critical alert fires after 5m.
          runbook_url: default_runbook_url
          summary: 'A RabbitMQ node reached the `disk_free_limit` threshold.

            See https://www.rabbitmq.com/docs/alarms#overview, https://www.rabbitmq.com/docs/disk-alarms.

            '
          dashboard_url: default_dashboard_url
