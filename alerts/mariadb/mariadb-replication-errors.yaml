additionalPrometheusRulesMap:
  mariadb-replication-errors:
    groups:
    - name: mariadb-replication-errors
      rules:
      - alert: mariadb-replication-errors-warning
        expr: mysql_slave_status_last_sql_errno != 0 or mysql_slave_status_last_io_errno != 0 or mysql_slave_status_last_errno != 0
        for: 5m
        labels:
          severity: warning
          group_name: mariadb-replication-errors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: MariaDB {{$labels.job}} on {{$labels.instance}} is reporting replication errors.
          runbook_url: default_runbook_url
          summary: MariaDB is reporting replication errors from {{$labels.instance}}, immediate attention is required.
          dashboard_url: default_dashboard_url
      - alert: mariadb-replication-errors-critical
        expr: mysql_slave_status_last_sql_errno != 0 or mysql_slave_status_last_io_errno != 0 or mysql_slave_status_last_errno != 0
        for: 15m
        labels:
          severity: critical
          group_name: mariadb-replication-errors
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: MariaDB {{$labels.job}} on {{$labels.instance}} is reporting replication errors.
          runbook_url: default_runbook_url
          summary: MariaDB is reporting replication errors from {{$labels.instance}}, immediate attention is required.
          dashboard_url: default_dashboard_url
