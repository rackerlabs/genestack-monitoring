additionalPrometheusRulesMap:
  mariadb-slow-queries:
    groups:
    - name: mariadb-slow-queries
      rules:
      - alert: mariadb-slow-queries-warning
        expr: increase(mysql_global_status_slow_queries[1m]) > 0
        for: 2m
        labels:
          severity: warning
          group_name: mariadb-slow-queries
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'MySQL server has some new slow queries.

            VALUE = {{ $value }}

            LABELS = {{ $labels }}

            '
          runbook_url: default_runbook_url
          summary: MySQL slow queries (instance {{ $labels.instance }})
          dashboard_url: default_dashboard_url
      - alert: mariadb-slow-queries-critical
        expr: increase(mysql_global_status_slow_queries[1m]) > 0
        for: 5m
        labels:
          severity: critical
          group_name: mariadb-slow-queries
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'MySQL server has some new slow queries.

            VALUE = {{ $value }}

            LABELS = {{ $labels }}

            '
          runbook_url: default_runbook_url
          summary: MySQL slow queries (instance {{ $labels.instance }})
          dashboard_url: default_dashboard_url
