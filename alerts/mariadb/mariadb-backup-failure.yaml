additionalPrometheusRulesMap:
  mariadb-backup-failure:
    groups:
    - name: mariadb-backup-failure
      rules:
      - alert: mariadb-backup-failure-warning
        expr: 'time() - kube_cronjob_status_last_successful_time{cronjob="mariadb-backup", namespace="openstack"} > 21900 or

          time() - kube_cronjob_status_last_successful_time{cronjob="mariadb-backup", namespace="grafana"} > 86700

          '
        for: 1h
        labels:
          severity: warning
          group_name: mariadb-backup-failure
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'Last MariaDB backup not successful within 1 hour of scheduled run.

            '
          runbook_url: default_runbook_url
          summary: Last MariaDB backup not successful within 1 hour of scheduled run
          dashboard_url: default_dashboard_url
      - alert: mariadb-backup-failure-critical
        expr: 'time() - kube_cronjob_status_last_successful_time{cronjob="mariadb-backup", namespace="openstack"} > 43200 or

          time() - kube_cronjob_status_last_successful_time{cronjob="mariadb-backup", namespace="grafana"} > 172800

          '
        for: 1h
        labels:
          severity: critical
          group_name: mariadb-backup-failure
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          description: 'Second successive MariaDB backup not successful within 1 hour of scheduled run.

            '
          runbook_url: default_runbook_url
          summary: Second successive MariaDB backup not successful within 1 hour of scheduled run
          dashboard_url: default_dashboard_url
