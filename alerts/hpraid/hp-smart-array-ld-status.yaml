additionalPrometheusRulesMap:
  hp-smart-array-ld-status:
    groups:
    - name: hp-smart-array-ld-status
      rules:
      - alert: hp-smart-array-ld-status-warning
        expr: hp_smart_array_ld_status{job="node-exporter"} < 1
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.k8s_node_name }}"
          group_name: hp-smart-array-ld-status
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID logical disk status alert: possible LD array recovery in-progress"
          description: "{{ $labels.name }}\nNode: {{ $labels.k8s_node_name }}"
      - alert: hp-smart-array-ld-status-critical
        expr: hp_smart_array_ld_status{job="node-exporter"} < 1
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.k8s_node_name }}"
          group_name: hp-smart-array-ld-status
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID logical disk status alert: possible LD array recovery in-progress"
          description: "{{ $labels.name }}\nNode: {{ $labels.k8s_node_name }}"
