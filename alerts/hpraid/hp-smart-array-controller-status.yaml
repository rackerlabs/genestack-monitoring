additionalPrometheusRulesMap:
  hp-smart-array-controller-status:
    groups:
    - name: hp-smart-array-controller-status
      rules:
      - alert: hp-smart-array-controller-status-warning
        expr: hp_smart_array_controller_status{job="node-exporter"} < 1
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.k8s_node_name }}"
          group_name: hp-smart-array-controller-status
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID controller status alert"
          description: "{{ $labels.name }}\nRAID card type: {{ $labels.product_name }}\nNode: {{ $labels.k8s_node_name }}"
      - alert: hp-smart-array-controller-status-critical
        expr: hp_smart_array_controller_status{job="node-exporter"} < 1
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.k8s_node_name }}"
          group_name: hp-smart-array-controller-status
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID controller status alert"
          description: "{{ $labels.name }}\nRAID card type: {{ $labels.product_name }}\nNode: {{ $labels.k8s_node_name }}"
