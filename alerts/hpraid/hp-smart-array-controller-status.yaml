additionalPrometheusRulesMap:
  hp-smart-array-controller-status:
    groups:
    - name: hp-smart-array-controller-status
      rules:
      - alert: hp-smart-array-controller-status-warning
        expr: hp_smart_array_controller_status{job="node-exporter"} < 1
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.instance }}"
          group_name: hp-smart-array-controller-status
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID controller status alert"
          description: "{{ $labels.name }}\nRAID card type: {{ $labels.product_name }}\nlabels: {{ $labels }}"
      - alert: hp-smart-array-controller-status-critical
        expr: hp_smart_array_controller_status{job="node-exporter"} < 1
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.instance }}"
          group_name: hp-smart-array-controller-status
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID controller status alert"
          description: "{{ $labels.name }}\nRAID card type: {{ $labels.product_name }}\nlabels: {{ $labels }}"
