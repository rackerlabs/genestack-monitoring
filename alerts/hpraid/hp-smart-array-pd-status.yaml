additionalPrometheusRulesMap:
  hp-smart-array-pd-status:
    groups:
    - name: hp-smart-array-pd-status
      rules:
      - alert: hp-smart-array-pd-status-warning
        expr: hp_smart_array_disk_status{job="node-exporter"} < 1
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.instance }}"
          group_name: hp-smart-array-pd-status
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID physical disk failure"
          description: "{{ $labels.name }}\nPort:Box:Bay: {{ $labels.port }}:{{ $labels.box }}:{{ $labels.bay }}\nSerial: {{ $labels.serial }}\nlabels: {{ $labels }}"
      - alert: hp-smart-array-pd-status-critical
        expr: hp_smart_array_disk_status{job="node-exporter"} < 1
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.instance }}"
          group_name: hp-smart-array-pd-status
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID physical disk failure"
          description: "{{ $labels.name }}\nPort:Box:Bay: {{ $labels.port }}:{{ $labels.box }}:{{ $labels.bay }}\nSerial: {{ $labels.serial }}\nlabels: {{ $labels }}"
