additionalPrometheusRulesMap:
  hp-smart-array-pd-status:
    groups:
    - name: hp-smart-array-pd-status
      rules:
      - alert: hp-smart-array-pd-status-warning
        expr: hp_smart_array_disk_status{job="node-exporter"} < 1
        for: 5m
        labels:
          severity: warning
          node: "{{ $labels.k8s_node_name }}"
          group_name: hp-smart-array-pd-status
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID physical disk failure"
          description: "{{ $labels.name }}\nPort:Box:Bay: {{ $labels.port }}:{{ $labels.box }}:{{ $labels.bay }}\nSerial: {{ $labels.serial }}\nNode: {{ $labels.k8s_node_name }}"
      - alert: hp-smart-array-pd-status-critical
        expr: hp_smart_array_disk_status{job="node-exporter"} < 1
        for: 15m
        labels:
          severity: critical
          node: "{{ $labels.k8s_node_name }}"
          group_name: hp-smart-array-pd-status
          node_hostname: '{{ $labels.k8s_node_name }}'
          affected_node: '{{ $labels.k8s_node_name }}'
          correlation_key: node/{{ $labels.k8s_node_name }}
          correlation_scope: node
          root_cause: 'true'
        annotations:
          runbook_url: default_runbook_url
          dashboard_url: default_dashboard_url
          summary: "HP RAID physical disk failure"
          description: "{{ $labels.name }}\nPort:Box:Bay: {{ $labels.port }}:{{ $labels.box }}:{{ $labels.bay }}\nSerial: {{ $labels.serial }}\nNode: {{ $labels.k8s_node_name }}"
