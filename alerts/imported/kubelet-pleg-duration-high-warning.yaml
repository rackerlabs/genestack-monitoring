additionalPrometheusRulesMap:
  kubelet-pleg-duration-high-warning:
    groups:
      - name: kubelet-pleg-duration-high
        rules:
          - alert: kubelet-pleg-duration-high-warning
            annotations:
              dashboard_url: default_dashboard_url
              description: The Kubelet Pod Lifecycle Event Generator has a 99th percentile duration of {{ $value }} seconds on node {{ $labels.node }} on cluster {{ $labels.cluster }}. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Kubelet Pod Lifecycle Event Generator is taking too long to relist.
            expr: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile{quantile="0.99"} >= 10
            for: 5m
            labels:
              group_name: kubelet-pleg-duration-high
              node_hostname: '{{ $labels.node }}'
              severity: warning
              affected_node: '{{ $labels.node }}'
              correlation_key: node/{{ $labels.node }}
              correlation_scope: node
              root_cause: 'true'
