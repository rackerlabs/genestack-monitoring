additionalPrometheusRulesMap:
  node-systemd-service-failed:
    groups:
      - name: node-systemd-service-failed
        rules:
          - alert: node-systemd-service-failed-warning
            expr: node_systemd_unit_state{state="failed"} == 1
            for: 5m
            labels:
              severity: warning
              group_name: node-systemd-service-failed
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Systemd service {{ $labels.name }} has entered failed state at {{ $labels.instance }}. This
                warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Systemd service has entered failed state.
              dashboard_url: default_dashboard_url
          - alert: node-systemd-service-failed-critical
            expr: node_systemd_unit_state{state="failed"} == 1
            for: 10m
            labels:
              severity: critical
              group_name: node-systemd-service-failed
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Systemd service {{ $labels.name }} has entered failed state at {{ $labels.instance }}. This
                critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Systemd service has entered failed state.
              dashboard_url: default_dashboard_url
