additionalPrometheusRulesMap:
  node-systemd-service-failed:
    groups:
      - name: node-systemd-service-failed
        rules:
          - alert: node-systemd-service-failed-warning
            expr: node_systemd_unit_state{job="otelcol-hostmetrics", state="failed"} == 1
            for: 5m
            labels:
              severity: warning
              group_name: node-systemd-service-failed
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Systemd service {{ $labels.name }} has entered failed state at {{ $labels.instance }}
              runbook_url: default_runbook_url
              summary: Systemd service has entered failed state.
              dashboard_url: default_dashboard_url
          - alert: node-systemd-service-failed-critical
            expr: node_systemd_unit_state{job="otelcol-hostmetrics", state="failed"} == 1
            for: 15m
            labels:
              severity: critical
              group_name: node-systemd-service-failed
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Systemd service {{ $labels.name }} has entered failed state at {{ $labels.instance }}
              runbook_url: default_runbook_url
              summary: Systemd service has entered failed state.
              dashboard_url: default_dashboard_url
