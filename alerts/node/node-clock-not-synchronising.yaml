additionalPrometheusRulesMap:
  node-clock-not-synchronising:
    groups:
      - name: node-clock-not-synchronising
        rules:
          - alert: node-clock-not-synchronising-warning
            expr: >-
              min_over_time(node_timex_sync_status{job="otelcol-hostmetrics"}[5m]) == 0
              and node_timex_maxerror_seconds{job="otelcol-hostmetrics"} >= 16
            for: 5m
            labels:
              severity: warning
              group_name: node-clock-not-synchronising
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Clock at {{ $labels.instance }} is not synchronising. Ensure NTP is configured on this host.
              runbook_url: default_runbook_url
              summary: Clock not synchronising.
              dashboard_url: default_dashboard_url
          - alert: node-clock-not-synchronising-critical
            expr: >-
              min_over_time(node_timex_sync_status{job="otelcol-hostmetrics"}[15m]) == 0

              and node_timex_maxerror_seconds{job="otelcol-hostmetrics"} >= 16
            for: 15m
            labels:
              severity: critical
              group_name: node-clock-not-synchronising
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Clock at {{ $labels.instance }} is not synchronising. Ensure NTP is configured on this host.
              runbook_url: default_runbook_url
              summary: Clock not synchronising.
              dashboard_url: default_dashboard_url
