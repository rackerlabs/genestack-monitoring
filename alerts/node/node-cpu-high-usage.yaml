additionalPrometheusRulesMap:
  node-cpu-high-usage:
    groups:
      - name: node-cpu-high-usage
        rules:
          - alert: node-cpu-high-usage-warning
            expr: 100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{job="node-exporter", mode="idle"}[5m]))) > 90
            for: 5m
            labels:
              severity: warning
              group_name: node-cpu-high-usage
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: CPU usage on {{ $labels.node_hostname }} has been above 90% for 5 minutes; current usage is {{ printf "%.2f" $value }}%.
              runbook_url: default_runbook_url
              summary: High CPU usage.
              dashboard_url: default_dashboard_url
          - alert: node-cpu-high-usage-critical
            expr: 100 * (1 - avg by(instance) (rate(node_cpu_seconds_total{job="node-exporter", mode="idle"}[5m]))) > 90
            for: 10m
            labels:
              severity: critical
              group_name: node-cpu-high-usage
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: CPU usage on {{ $labels.node_hostname }} has been above 90% for 10 minutes; current usage is {{ printf "%.2f" $value }}%.
              runbook_url: default_runbook_url
              summary: High CPU usage.
              dashboard_url: default_dashboard_url
