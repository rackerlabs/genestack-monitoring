additionalPrometheusRulesMap:
  node-memory-major-pages-faults:
    groups:
      - name: node-memory-major-pages-faults
        rules:
          - alert: node-memory-major-pages-faults-warning
            expr: rate(system_paging_faults_total{type="major"}[5m]) > 500
            for: 5m
            labels:
              severity: warning
              group_name: node-memory-major-pages-faults
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page
                faults per second for the last 5 minutes, is currently at {{ printf "%.2f" $value }}. Please
                check that there is enough memory available at this instance.
              runbook_url: default_runbook_url
              summary: Memory major page faults are occurring at very high rate.
              dashboard_url: default_dashboard_url
          - alert: node-memory-major-pages-faults-critical
            expr: rate(system_paging_faults_total{type="major"}[5m]) > 500
            for: 10m
            labels:
              severity: critical
              group_name: node-memory-major-pages-faults
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page
                faults per second for the last 10 minutes, is currently at {{ printf "%.2f" $value }}. Please
                check that there is enough memory available at this instance.
              runbook_url: default_runbook_url
              summary: Memory major page faults are occurring at very high rate.
              dashboard_url: default_dashboard_url
