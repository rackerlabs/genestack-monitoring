additionalPrometheusRulesMap:
  node-raid-degraded:
    groups:
      - name: node-raid-degraded
        rules:
          - alert: node-raid-degraded-warning
            expr: >-
              node_md_disks_required{device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}

              - ignoring (state)

              (node_md_disks{state="active",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"})

              > 0
            for: 5m
            labels:
              severity: warning
              group_name: node-raid-degraded
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                RAID array '{{ $labels.device }}' at {{ $labels.instance }} is in degraded state due to one or
                more disks failures. Number of spare drives is insufficient to fix issue automatically. This
                warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: RAID Array is degraded.
              dashboard_url: default_dashboard_url
          - alert: node-raid-degraded-critical
            expr: >-
              node_md_disks_required{device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}

              - ignoring (state)

              (node_md_disks{state="active",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"})

              > 0
            for: 10m
            labels:
              severity: critical
              group_name: node-raid-degraded
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                RAID array '{{ $labels.device }}' at {{ $labels.instance }} is in degraded state due to one or
                more disks failures. Number of spare drives is insufficient to fix issue automatically. This
                critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: RAID Array is degraded.
              dashboard_url: default_dashboard_url
