additionalPrometheusRulesMap:
  node-raid-disk-failure:
    groups:
      - name: node-raid-disk-failure
        rules:
          - alert: node-raid-disk-failure-warning
            expr: >-
              node_md_disks{state="failed",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}

              > 0
            for: 5m
            labels:
              severity: warning
              group_name: node-raid-disk-failure
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                At least one device in RAID array at {{ $labels.instance }} failed. Array '{{ $labels.device }}'
                needs attention and possibly a disk swap. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Failed device in RAID array.
              dashboard_url: default_dashboard_url
          - alert: node-raid-disk-failure-critical
            expr: >-
              node_md_disks{state="failed",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}

              > 0
            for: 10m
            labels:
              severity: critical
              group_name: node-raid-disk-failure
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                At least one device in RAID array at {{ $labels.instance }} failed. Array '{{ $labels.device }}'
                needs attention and possibly a disk swap. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Failed device in RAID array.
              dashboard_url: default_dashboard_url
