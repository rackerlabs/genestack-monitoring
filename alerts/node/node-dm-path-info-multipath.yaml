additionalPrometheusRulesMap:
  node-dm-path-info-multipath:
    groups:
    - name: node-dm-path-info-multipath
      rules:
      - alert: node-dm-path-info-multipath-warning
        expr: node_dmpath_info{path_checker_state!~"active|ready"}
        for: 2m
        labels:
          severity: warning
          group_name: node-dm-path-info-multipath
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
          coreaccountid: '{{ $labels.rackspace_com_coreAccountID }}'
          coredeviceid: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.instance }}'
        annotations:
          description: '{{ $labels.name }}

            labels: {{ $labels }}'
          runbook_url: default_runbook_url
          summary: Multipathd paths are NOT active|ready and paths are likely orphaned
          dashboard_url: default_dashboard_url
      - alert: node-dm-path-info-multipath-critical
        expr: node_dmpath_info{path_checker_state!~"active|ready"}
        for: 5m
        labels:
          severity: critical
          group_name: node-dm-path-info-multipath
          node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
          coreaccountid: '{{ $labels.rackspace_com_coreAccountID }}'
          coredeviceid: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.instance }}'
        annotations:
          description: '{{ $labels.name }}

            labels: {{ $labels }}'
          runbook_url: default_runbook_url
          summary: Multipathd paths are NOT active|ready and paths are likely orphaned
          dashboard_url: default_dashboard_url
