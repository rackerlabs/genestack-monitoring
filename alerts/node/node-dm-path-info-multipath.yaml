additionalPrometheusRulesMap:
  node-dm-path-info-multipath:
    groups:
    - name: node-dm-path-info-multipath
      rules:
      - alert: node-dm-path-info-multipath-warning
        expr: node_dmpath_info{path_checker_state!~"active|ready"}
        for: 2m
        labels:
          severity: warning
          group_name: node-dm-path-info-multipath
          node_hostname: '{{ $labels.k8s_node_name }}'
          coreaccountid: '{{ $labels.rackspace_com_coreAccountID }}'
          coredeviceid: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.k8s_node_name }}'
        annotations:
          description: >-
            {{ $labels.name }} on node {{ $labels.k8s_node_name }}. This warning alert fires after 2m.
          runbook_url: default_runbook_url
          summary: Multipathd paths are NOT active|ready and paths are likely orphaned
          dashboard_url: default_dashboard_url
      - alert: node-dm-path-info-multipath-critical
        expr: node_dmpath_info{path_checker_state!~"active|ready"}
        for: 5m
        labels:
          severity: critical
          group_name: node-dm-path-info-multipath
          node_hostname: '{{ $labels.k8s_node_name }}'
          coreaccountid: '{{ $labels.rackspace_com_coreAccountID }}'
          coredeviceid: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.k8s_node_name }}'
        annotations:
          description: >-
            {{ $labels.name }} on node {{ $labels.k8s_node_name }}. This critical alert fires after 5m.
          runbook_url: default_runbook_url
          summary: Multipathd paths are NOT active|ready and paths are likely orphaned
          dashboard_url: default_dashboard_url
