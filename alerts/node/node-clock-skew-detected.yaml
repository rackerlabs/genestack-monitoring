additionalPrometheusRulesMap:
  node-clock-skew-detected:
    groups:
      - name: node-clock-skew-detected
        rules:
          - alert: node-clock-skew-detected-warning
            expr: >-
              ( node_timex_offset_seconds > 0.05
              and deriv(node_timex_offset_seconds[5m]) >= 0 )
              or ( node_timex_offset_seconds < -0.05
              and deriv(node_timex_offset_seconds[5m]) <= 0 )
            for: 5m
            labels:
              severity: warning
              group_name: node-clock-skew-detected
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Clock at {{ $labels.instance }} is out of sync by more than 0.05s. Ensure NTP is configured
                correctly on this host. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Clock skew detected.
              dashboard_url: default_dashboard_url
          - alert: node-clock-skew-detected-critical
            expr: >-
              ( node_timex_offset_seconds > 0.05

              and deriv(node_timex_offset_seconds[5m]) >= 0 )

              or ( node_timex_offset_seconds < -0.05

              and deriv(node_timex_offset_seconds[5m]) <= 0 )
            for: 10m
            labels:
              severity: critical
              group_name: node-clock-skew-detected
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Clock at {{ $labels.instance }} is out of sync by more than 0.05s. Ensure NTP is configured
                correctly on this host. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Clock skew detected.
              dashboard_url: default_dashboard_url
