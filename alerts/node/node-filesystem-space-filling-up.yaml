additionalPrometheusRulesMap:
  node-filesystem-space-filling-up:
    groups:
      - name: node-filesystem-space-filling-up
        rules:
          - alert: node-filesystem-space-filling-up-warning
            expr: >-
              ( system_filesystem_usage_bytes{fstype!="",mountpoint!="",state="free"} / sum by (device, mountpoint, fstype, instance) (system_filesystem_usage_bytes{fstype!="",mountpoint!=""}) * 100 < 10

              and predict_linear(system_filesystem_usage_bytes{fstype!="",mountpoint!="",state="free"}[6h], 4*60*60) < 0 )
            for: 1h
            labels:
              severity: warning
              group_name: node-filesystem-space-filling-up
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance
                }} has only {{ printf "%.2f" $value }}% available space left and is filling up fast.
              runbook_url: default_runbook_url
              summary: Filesystem is predicted to run out of space within the next 4 hours.
              dashboard_url: default_dashboard_url
          - alert: node-filesystem-space-filling-up-critical
            expr: >-
              ( system_filesystem_usage_bytes{fstype!="",mountpoint!="",state="free"} / sum by (device, mountpoint, fstype, instance) (system_filesystem_usage_bytes{fstype!="",mountpoint!=""}) * 100 < 10

              and predict_linear(system_filesystem_usage_bytes{fstype!="",mountpoint!="",state="free"}[6h], 4*60*60) < 0 )
            for: 1h
            labels:
              severity: critical
              group_name: node-filesystem-space-filling-up
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance
                }} has only {{ printf "%.2f" $value }}% available space left and is filling up fast.
              runbook_url: default_runbook_url
              summary: Filesystem is predicted to run out of space within the next 4 hours.
              dashboard_url: default_dashboard_url
