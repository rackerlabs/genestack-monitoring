additionalPrometheusRulesMap:
  node-filesystem-almost-out-of-space:
    groups:
      - name: node-filesystem-almost-out-of-space
        rules:
          - alert: node-filesystem-almost-out-of-space-warning
            expr: >-
              ( system_filesystem_usage_bytes{fstype!="",mountpoint!="",state="free"} / sum by (device, mountpoint, fstype, instance) (system_filesystem_usage_bytes{fstype!="",mountpoint!=""}) * 100 < 3 )
            for: 30m
            labels:
              severity: warning
              group_name: node-filesystem-almost-out-of-space
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance
                }} has only {{ printf "%.2f" $value }}% available space left.
              runbook_url: default_runbook_url
              summary: Filesystem has less than 3% space left.
              dashboard_url: default_dashboard_url
          - alert: node-filesystem-almost-out-of-space-critical
            expr: >-
              ( system_filesystem_usage_bytes{fstype!="",mountpoint!="",state="free"} / sum by (device, mountpoint, fstype, instance) (system_filesystem_usage_bytes{fstype!="",mountpoint!=""}) * 100 < 3 )
            for: 30m
            labels:
              severity: critical
              group_name: node-filesystem-almost-out-of-space
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance
                }} has only {{ printf "%.2f" $value }}% available space left.
              runbook_url: default_runbook_url
              summary: Filesystem has less than 3% space left.
              dashboard_url: default_dashboard_url
