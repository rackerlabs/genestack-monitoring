additionalPrometheusRulesMap:
  node-md-info-failed-device:
    groups:
    - name: node-md-info-failed-device
      rules:
      - alert: node-md-info-failed-device-warning
        expr: node_md_info{job="node-exporter", FailedDevices!="0"} > 0
        for: 2m
        labels:
          severity: warning
          group_name: node-md-info-failed-device
          node_hostname: '{{ $labels.k8s_node_name }}'
          coreAccountID: '{{ $labels.rackspace_com_coreAccountID }}'
          coreDeviceID: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.k8s_node_name }}'
        annotations:
          description: >-
            {{ $labels.name }} Number MD Failed:{{ $labels.FailedDevices }} on node {{ $labels.k8s_node_name }}.
            This warning alert fires after 2m.
          runbook_url: default_runbook_url
          summary: NVME device on Linux software RAID failure info
          dashboard_url: default_dashboard_url
      - alert: node-md-info-failed-device-critical
        expr: node_md_info{job="node-exporter", FailedDevices!="0"} > 0
        for: 5m
        labels:
          severity: critical
          group_name: node-md-info-failed-device
          node_hostname: '{{ $labels.k8s_node_name }}'
          coreAccountID: '{{ $labels.rackspace_com_coreAccountID }}'
          coreDeviceID: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.k8s_node_name }}'
        annotations:
          description: >-
            {{ $labels.name }} Number MD Failed:{{ $labels.FailedDevices }} on node {{ $labels.k8s_node_name }}.
            This critical alert fires after 5m.
          runbook_url: default_runbook_url
          summary: NVME device on Linux software RAID failure info
          dashboard_url: default_dashboard_url
