additionalPrometheusRulesMap:
  node-bonding-degraded:
    groups:
      - name: node-bonding-degraded
        rules:
          - alert: node-bonding-degraded-warning
            expr: (node_bonding_slaves - node_bonding_active) != 0
            for: 5m
            labels:
              severity: warning
              group_name: node-bonding-degraded
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Bonding interface {{ $labels.master }} on {{ $labels.instance }} is in degraded state due to one
                or more slave failures. This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Bonding interface is degraded.
              dashboard_url: default_dashboard_url
          - alert: node-bonding-degraded-critical
            expr: (node_bonding_slaves - node_bonding_active) != 0
            for: 10m
            labels:
              severity: critical
              group_name: node-bonding-degraded
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Bonding interface {{ $labels.master }} on {{ $labels.instance }} is in degraded state due to one
                or more slave failures. This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Bonding interface is degraded.
              dashboard_url: default_dashboard_url
