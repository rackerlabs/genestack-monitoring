additionalPrometheusRulesMap:
  node-system-saturation:
    groups:
      - name: node-system-saturation
        rules:
          - alert: node-system-saturation-warning
            expr: >-
              system_cpu_load_average_1m / count without (cpu, mode) (system_cpu_time_seconds_total{mode="idle"}) > 2
            for: 5m
            labels:
              severity: warning
              group_name: node-system-saturation
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                System load per core at {{ $labels.instance }} has been above 2 for the last 5 minutes, is
                currently at {{ printf "%.2f" $value }}. This might indicate this instance resources saturation
                and can cause it becoming unresponsive.
              runbook_url: default_runbook_url
              summary: System saturated, load per core is very high.
              dashboard_url: default_dashboard_url
          - alert: node-system-saturation-critical
            expr: >-
              system_cpu_load_average_1m / count without (cpu, mode) (system_cpu_time_seconds_total{mode="idle"}) > 2
            for: 10m
            labels:
              severity: critical
              group_name: node-system-saturation
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                System load per core at {{ $labels.instance }} has been above 2 for the last 10 minutes, is
                currently at {{ printf "%.2f" $value }}. This might indicate this instance resources saturation
                and can cause it becoming unresponsive.
              runbook_url: default_runbook_url
              summary: System saturated, load per core is very high.
              dashboard_url: default_dashboard_url
