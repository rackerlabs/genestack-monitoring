additionalPrometheusRulesMap:
  node-file-descriptor-limit:
    groups:
      - name: node-file-descriptor-limit
        rules:
          - alert: node-file-descriptor-limit-warning
            expr: ( system_linux_file_handles{state="allocated"} * 100 / system_linux_file_handles{state="maximum"} > 90 )
            for: 5m
            labels:
              severity: warning
              group_name: node-file-descriptor-limit
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                File descriptors limit at {{ $labels.instance }} is currently at {{ printf "%.2f" $value }}%.
                This warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Kernel is predicted to exhaust file descriptors limit soon.
              dashboard_url: default_dashboard_url
          - alert: node-file-descriptor-limit-critical
            expr: ( system_linux_file_handles{state="allocated"} * 100 / system_linux_file_handles{state="maximum"} > 90 )
            for: 10m
            labels:
              severity: critical
              group_name: node-file-descriptor-limit
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                File descriptors limit at {{ $labels.instance }} is currently at {{ printf "%.2f" $value }}%.
                This critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Kernel is predicted to exhaust file descriptors limit soon.
              dashboard_url: default_dashboard_url
