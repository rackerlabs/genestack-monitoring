additionalPrometheusRulesMap:
  node-file-descriptor-limit:
    groups:
      - name: node-file-descriptor-limit
        rules:
          - alert: node-file-descriptor-limit-warning
            expr: ( system_linux_file_handles{job="otelcol-hostmetrics",state="allocated"} * 100 / system_linux_file_handles{job="otelcol-hostmetrics",state="maximum"} > 90 )
            for: 5m
            labels:
              severity: warning
              group_name: node-file-descriptor-limit
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: File descriptors limit at {{ $labels.instance }} is currently at {{ printf "%.2f" $value }}%.
              runbook_url: default_runbook_url
              summary: Kernel is predicted to exhaust file descriptors limit soon.
              dashboard_url: default_dashboard_url
          - alert: node-file-descriptor-limit-critical
            expr: ( system_linux_file_handles{job="otelcol-hostmetrics",state="allocated"} * 100 / system_linux_file_handles{job="otelcol-hostmetrics",state="maximum"} > 90 )
            for: 15m
            labels:
              severity: critical
              group_name: node-file-descriptor-limit
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: File descriptors limit at {{ $labels.instance }} is currently at {{ printf "%.2f" $value }}%.
              runbook_url: default_runbook_url
              summary: Kernel is predicted to exhaust file descriptors limit soon.
              dashboard_url: default_dashboard_url
