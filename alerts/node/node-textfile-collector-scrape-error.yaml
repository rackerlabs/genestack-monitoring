additionalPrometheusRulesMap:
  node-textfile-collector-scrape-error:
    groups:
      - name: node-textfile-collector-scrape-error
        rules:
          - alert: node-textfile-collector-scrape-error-warning
            expr: node_textfile_scrape_error == 1
            for: 5m
            labels:
              severity: warning
              group_name: node-textfile-collector-scrape-error
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Node Exporter text file collector on {{ $labels.instance }} failed to scrape. This warning alert
                fires after 5m.
              runbook_url: default_runbook_url
              summary: Node Exporter text file collector failed to scrape.
              dashboard_url: default_dashboard_url
          - alert: node-textfile-collector-scrape-error-critical
            expr: node_textfile_scrape_error == 1
            for: 10m
            labels:
              severity: critical
              group_name: node-textfile-collector-scrape-error
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Node Exporter text file collector on {{ $labels.instance }} failed to scrape. This critical
                alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Node Exporter text file collector failed to scrape.
              dashboard_url: default_dashboard_url
