additionalPrometheusRulesMap:
  node-textfile-collector-scrape-error:
    groups:
      - name: node-textfile-collector-scrape-error
        rules:
          - alert: node-textfile-collector-scrape-error-warning
            expr: node_textfile_scrape_error{job="otelcol-hostmetrics"} == 1
            for: 5m
            labels:
              severity: warning
              group_name: node-textfile-collector-scrape-error
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Node Exporter text file collector on {{ $labels.instance }} failed to scrape.
              runbook_url: default_runbook_url
              summary: Node Exporter text file collector failed to scrape.
              dashboard_url: default_dashboard_url
          - alert: node-textfile-collector-scrape-error-critical
            expr: node_textfile_scrape_error{job="otelcol-hostmetrics"} == 1
            for: 15m
            labels:
              severity: critical
              group_name: node-textfile-collector-scrape-error
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: Node Exporter text file collector on {{ $labels.instance }} failed to scrape.
              runbook_url: default_runbook_url
              summary: Node Exporter text file collector failed to scrape.
              dashboard_url: default_dashboard_url
