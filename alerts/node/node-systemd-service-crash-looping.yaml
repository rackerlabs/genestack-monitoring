additionalPrometheusRulesMap:
  node-systemd-service-crash-looping:
    groups:
      - name: node-systemd-service-crash-looping
        rules:
          - alert: node-systemd-service-crash-looping-warning
            expr: increase(node_systemd_service_restart_total[5m]) > 2
            for: 5m
            labels:
              severity: warning
              group_name: node-systemd-service-crash-looping
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Systemd service {{ $labels.name }} has being restarted too many times at {{ $labels.instance }}
                for the last 5 minutes. Please check if service is crash looping.
              runbook_url: default_runbook_url
              summary: Systemd service keeps restaring, possibly crash looping.
              dashboard_url: default_dashboard_url
          - alert: node-systemd-service-crash-looping-critical
            expr: increase(node_systemd_service_restart_total[5m]) > 2
            for: 10m
            labels:
              severity: critical
              group_name: node-systemd-service-crash-looping
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                Systemd service {{ $labels.name }} has being restarted too many times at {{ $labels.instance }}
                for the last 10 minutes. Please check if service is crash looping.
              runbook_url: default_runbook_url
              summary: Systemd service keeps restaring, possibly crash looping.
              dashboard_url: default_dashboard_url
