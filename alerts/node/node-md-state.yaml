additionalPrometheusRulesMap:
  node-md-state:
    groups:
    - name: node-md-state
      rules:
      - alert: node-md-state-warning
        expr: node_md_state{job="node-exporter", state!~"active.*|check.*"} > 0
        for: 3m
        labels:
          severity: warning
          group_name: node-md-state
          node_hostname: '{{ $labels.k8s_node_name }}'
          coreAccountID: '{{ $labels.rackspace_com_coreAccountID }}'
          coreDeviceID: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.k8s_node_name }}'
        annotations:
          description: >-
            {{ $labels.name }} MD RAID status:{{ $value }} MD RAID device:{{ $labels.device }} on node {{ $labels.k8s_node_name }}.
            This warning alert fires after 3m.
          runbook_url: default_runbook_url
          summary: Linux MDM RAID State is {{ $labels.state }}
          dashboard_url: default_dashboard_url
      - alert: node-md-state-critical
        expr: node_md_state{job="node-exporter", state!~"active.*|check.*"} > 0
        for: 10m
        labels:
          severity: critical
          group_name: node-md-state
          node_hostname: '{{ $labels.k8s_node_name }}'
          coreAccountID: '{{ $labels.rackspace_com_coreAccountID }}'
          coreDeviceID: '{{ $labels.rackspace_com_coreDeviceID }}'
          node: '{{ $labels.k8s_node_name }}'
        annotations:
          description: >-
            {{ $labels.name }} MD RAID status:{{ $value }} MD RAID device:{{ $labels.device }} on node {{ $labels.k8s_node_name }}.
            This critical alert fires after 10m.
          runbook_url: default_runbook_url
          summary: Linux MDM RAID State is {{ $labels.state }}
          dashboard_url: default_dashboard_url
