additionalPrometheusRulesMap:
  node-high-number-conntrack-entries-used:
    groups:
      - name: node-high-number-conntrack-entries-used
        rules:
          - alert: node-high-number-conntrack-entries-used-warning
            expr: (system_linux_conntrack_count{job="otelcol-hostmetrics"} / system_linux_conntrack_max{job="otelcol-hostmetrics"}) > 0.75
            for: 5m
            labels:
              severity: warning
              group_name: node-high-number-conntrack-entries-used
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: "{{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used."
              runbook_url: default_runbook_url
              summary: Number of conntrack are getting close to the limit.
              dashboard_url: default_dashboard_url
          - alert: node-high-number-conntrack-entries-used-critical
            expr: (system_linux_conntrack_count{job="otelcol-hostmetrics"} / system_linux_conntrack_max{job="otelcol-hostmetrics"}) > 0.75
            for: 15m
            labels:
              severity: critical
              group_name: node-high-number-conntrack-entries-used
              node_hostname: '{{ reReplaceAll ":.*" "" $labels.instance }}'
            annotations:
              description: "{{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used."
              runbook_url: default_runbook_url
              summary: Number of conntrack are getting close to the limit.
              dashboard_url: default_dashboard_url
