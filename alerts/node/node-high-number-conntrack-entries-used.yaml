additionalPrometheusRulesMap:
  node-high-number-conntrack-entries-used:
    groups:
      - name: node-high-number-conntrack-entries-used
        rules:
          - alert: node-high-number-conntrack-entries-used-warning
            expr: (system_linux_conntrack_count / system_linux_conntrack_max) > 0.75
            for: 5m
            labels:
              severity: warning
              group_name: node-high-number-conntrack-entries-used
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                {{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used. This
                warning alert fires after 5m.
              runbook_url: default_runbook_url
              summary: Number of conntrack are getting close to the limit.
              dashboard_url: default_dashboard_url
          - alert: node-high-number-conntrack-entries-used-critical
            expr: (system_linux_conntrack_count / system_linux_conntrack_max) > 0.75
            for: 10m
            labels:
              severity: critical
              group_name: node-high-number-conntrack-entries-used
              node_hostname: '{{ $labels.k8s_node_name }}'
            annotations:
              description: >-
                {{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used. This
                critical alert fires after 10m.
              runbook_url: default_runbook_url
              summary: Number of conntrack are getting close to the limit.
              dashboard_url: default_dashboard_url
