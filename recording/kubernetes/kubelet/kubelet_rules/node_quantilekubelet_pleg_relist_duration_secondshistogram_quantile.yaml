additionalPrometheusRulesMap:
  node-quantilekubelet-pleg-relist-duration-secondshistogram-quantile:
    groups:
      - name: kubelet-rules
        rules:
          - expr: histogram_quantile( 0.5, sum(rate(kubelet_pleg_relist_duration_seconds_bucket{job="kubelet", metrics_path="/metrics"}[5m])) by (cluster, instance, le) * on (cluster, instance) group_left (node) max by (cluster, instance, node) (kubelet_node_name{job="kubelet", metrics_path="/metrics"}) )
            labels:
              quantile: '0.5'
            record: node_quantile:kubelet_pleg_relist_duration_seconds:histogram_quantile
